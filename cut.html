<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ID Filter Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#060816;
--card:rgba(15,23,42,.72);
--border:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;

--primary1:#8b5cf6;
--primary2:#6366f1;

--green1:#10b981;
--green2:#059669;

--shadow:0 10px 40px rgba(0,0,0,.35);
--radius:24px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left,#312e81 0%,transparent 28%),
radial-gradient(circle at bottom right,#0f766e 0%,transparent 28%),
linear-gradient(135deg,#020617,#0f172a 45%,#111827);
min-height:100vh;
padding:40px 24px;
color:var(--text);
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
backdrop-filter:blur(90px);
pointer-events:none;
}

.container{
max-width:1400px;
margin:auto;
position:relative;
z-index:1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:35px;
flex-wrap:wrap;
}

.title-wrap h1{
font-size:40px;
font-weight:800;
letter-spacing:-1px;
margin-bottom:10px;
}

.title-wrap p{
color:var(--muted);
font-size:15px;
}

.badge{
padding:10px 16px;
border-radius:999px;
background:rgba(139,92,246,.12);
border:1px solid rgba(139,92,246,.25);
color:#c4b5fd;
font-size:13px;
font-weight:600;
backdrop-filter:blur(12px);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:26px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:24px;
backdrop-filter:blur(20px);
box-shadow:var(--shadow);
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
width:180px;
height:180px;
background:radial-gradient(circle,rgba(99,102,241,.18),transparent 70%);
top:-80px;
right:-80px;
}

.card-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:16px;
}

.card-title{
font-size:18px;
font-weight:700;
}

.card-sub{
font-size:13px;
color:var(--muted);
margin-top:4px;
}

textarea{
width:100%;
height:340px;
border:none;
outline:none;
resize:none;
padding:18px;
border-radius:18px;
background:rgba(2,6,23,.7);
color:white;
font-size:14px;
line-height:1.7;
border:1px solid rgba(255,255,255,.06);
transition:.25s;
}

textarea:focus{
border-color:rgba(139,92,246,.65);
box-shadow:
0 0 0 4px rgba(139,92,246,.12),
0 10px 30px rgba(99,102,241,.18);
transform:translateY(-1px);
}

textarea::placeholder{
color:#64748b;
}

.actions{
display:flex;
justify-content:center;
margin-top:34px;
}

button{
border:none;
outline:none;
cursor:pointer;
transition:.22s;
font-family:'Inter',sans-serif;
}

.calculate{
padding:16px 34px;
border-radius:18px;
font-size:15px;
font-weight:700;
color:white;
background:
linear-gradient(135deg,var(--primary1),var(--primary2));
box-shadow:
0 10px 30px rgba(99,102,241,.35);
}

.calculate:hover{
transform:translateY(-2px) scale(1.02);
}

.result-wrap{
margin-top:34px;
}

.result-header{
display:flex;
justify-content:flex-start;
align-items:center;
gap:14px;
margin-bottom:16px;
flex-wrap:wrap;
}

.result-title{
font-size:22px;
font-weight:800;
}

.result-info{
font-size:14px;
color:var(--muted);
margin-top:4px;
}

.copy{
padding:12px 18px;
border-radius:14px;
font-size:13px;
font-weight:700;
color:white;
background:
linear-gradient(135deg,var(--green1),var(--green2));
box-shadow:
0 10px 24px rgba(16,185,129,.22);
}

.copy:hover{
transform:translateY(-1px);
}

.result-box{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:24px;
backdrop-filter:blur(18px);
box-shadow:var(--shadow);
}

.result{
min-height:120px;
padding:18px;
border-radius:18px;
background:rgba(2,6,23,.72);
border:1px solid rgba(255,255,255,.06);
font-size:14px;
line-height:1.8;
word-break:break-word;
white-space:pre-wrap;
color:#e2e8f0;
}

.stats{
margin-top:16px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.stat{
padding:12px 16px;
border-radius:14px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
}

.stat-label{
font-size:12px;
color:var(--muted);
margin-bottom:4px;
}

.stat-value{
font-size:18px;
font-weight:800;
}

.toast{
position:fixed;
top:24px;
left:50%;
transform:translateX(-50%) translateY(-20px);
background:linear-gradient(135deg,#10b981,#059669);
color:white;
padding:14px 22px;
border-radius:14px;
font-size:14px;
font-weight:700;
opacity:0;
pointer-events:none;
transition:.25s;
z-index:999;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

@media(max-width:960px){

.grid{
grid-template-columns:1fr;
}

.title-wrap h1{
font-size:30px;
}

textarea{
height:260px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div class="title-wrap">
<h1>Filter Tool</h1>
<p>กรองข้อมูลออกจากรายการทั้งหมด พร้อมตัดข้อมูลซ้ำอัตโนมัติ</p>
</div>

<div class="badge">
⚡ Fast Filter Utility
</div>

</div>

<div class="grid">

<div class="card">

<div class="card-header">
<div>
<div class="card-title">Exclude List</div>
<div class="card-sub" style="color:#fb7185;font-weight:600;">
รายการที่ไม่ต้องการ
</div>
</div>
</div>

<textarea
id="exclude"
placeholder="เช่น&#10;1001,1002,1003&#10;&#10;หรือขึ้นบรรทัดใหม่ก็ได้">
</textarea>

</div>

<div class="card">

<div class="card-header">
<div>
<div class="card-title">Data List</div>
<div class="card-sub">ข้อมูลทั้งหมดที่ต้องการกรอง</div>
</div>
</div>

<textarea
id="data"
placeholder="วางข้อมูลทั้งหมดตรงนี้...">
</textarea>

</div>

</div>

<div class="actions">
<button class="calculate" onclick="calculate()">
🚀 Calculate Result
</button>
</div>

<div class="result-wrap">

<div class="result-header">

<div>
<div class="result-title">Result</div>
<div class="result-info" id="info">
ยังไม่มีข้อมูล
</div>
</div>

<button class="copy" onclick="copyResult()" id="copyBtn">
📋 Copy Result (0)
</button>

</div>

<div class="result-box">

<div class="result" id="result">
รอผลลัพธ์...
</div>

<div class="stats">

<div class="stat">
<div class="stat-label">Total Result</div>
<div class="stat-value" id="totalCount">0</div>
</div>

<div class="stat">
<div class="stat-label">Duplicates Removed</div>
<div class="stat-value" id="dupCount">0</div>
</div>

</div>

</div>

</div>

</div>

<div class="toast" id="toast">
Copied Successfully
</div>

<script>

function parseInput(text){

return text
.replace(/\n/g,",")
.split(",")
.map(x=>x.trim())
.filter(x=>x!="");

}

function calculate(){

let exclude=new Set(
parseInput(
document.getElementById("exclude").value
)
);

let data=parseInput(
document.getElementById("data").value
);

let beforeUnique=data.length;

let filtered=data.filter(x=>!exclude.has(x));

let result=[...new Set(filtered)];

let duplicateRemoved=
beforeUnique-result.length;

let output=result.join(",");

document.getElementById("result").textContent=
output || "ไม่พบข้อมูล";

document.getElementById("info").textContent=
"Filtered Successfully";

document.getElementById("copyBtn").textContent=
"📋 Copy Result ("+result.length+")";

document.getElementById("totalCount").textContent=
result.length;

document.getElementById("dupCount").textContent=
duplicateRemoved;

}

function copyResult(){

let text=document.getElementById("result").textContent;

navigator.clipboard.writeText(text);

let toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},1800);

}

</script>

</body>
</html>

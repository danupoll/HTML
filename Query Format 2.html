<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เครื่องมือจัดรูปแบบ Query</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
background:#f2f2f7;
color:#1d1d1f;
padding-top:60px;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#111827;
display:flex;
align-items:center;
padding:0 24px;
color:#fff;
z-index:10;
}

.logo{font-weight:600;}

.wrapper{
max-width:1200px;
margin:auto;
display:flex;
gap:32px;
padding:30px;
}

.sidebar{
width:240px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
border-radius:20px;
padding:22px;
border:1px solid #e5e5ea;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
height:fit-content;
}

.sidebar h3{
font-size:15px;
margin-bottom:10px;
color:#6e6e73;
}

.option-card{
border:1px solid #e5e5ea;
padding:12px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
background:#fff;
transition:0.15s;
font-size:14px;
}

.option-card:hover{background:#f9fafb;}

.option-card.active{
border-color:#0071e3;
background:#eef6ff;
}

.main{
flex:1;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
border-radius:20px;
padding:28px;
border:1px solid #e5e5ea;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{font-size:26px;margin-bottom:10px;}

.desc{color:#6e6e73;margin-bottom:20px;}

textarea{
width:100%;
height:180px;
border-radius:14px;
border:1px solid #e5e5ea;
padding:16px;
font-size:14px;
resize:none;
outline:none;
}

button{
margin-top:8px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#0071e3;
color:#fff;
font-size:14px;
cursor:pointer;
}

.summary{
margin-top:20px;
background:#fff;
border:1px solid #e5e5ea;
border-radius:16px;
padding:16px;
line-height:1.8;
}

.summary strong{color:#ff7a00;}

.output-head{margin-top:20px;}

.output-title{
font-weight:600;
margin-bottom:6px;
}

.output{
margin-top:10px;
background:#fff;
border:1px solid #e5e5ea;
border-radius:16px;
padding:16px;
font-family:Menlo,Consolas,monospace;
white-space:pre;
line-height:2;
max-height:420px;
overflow:auto;
}

.copy-success{background:#16a34a!important;}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">เครื่องมือจัดรูปแบบ Query</div>
</div>

<div class="wrapper">

<div class="sidebar">

<h3>รูปแบบ</h3>

<div class="option-card active" data-format="comma">100,200,300</div>
<div class="option-card" data-format="single">'100','200','300'</div>
<div class="option-card" data-format="double">"100","200","300"</div>

<h3 style="margin-top:20px;">เงื่อนไข</h3>

<div class="option-card active" data-filter="unique">แสดงทั้งหมดโดยตัดซ้ำ</div>
<div class="option-card" data-filter="duplicate">แสดงเฉพาะรายการที่ซ้ำ</div>
<div class="option-card" data-filter="onlyonce">แสดงเฉพาะรายการที่ไม่ซ้ำ</div>

</div>

<div class="main">

<h1>Query Format Tool</h1>

<p class="desc">วางรายการ ระบบจะลบค่าซ้ำและจัดรูปแบบให้ทันที</p>

<textarea id="inputArea"></textarea>

<button onclick="process()">ประมวลผล</button>

<div class="summary" id="summary"></div>

<div class="output-head">
<div class="output-title">ผลลัพธ์</div>
<button id="copyBtn" onclick="copyResult()">Copy (0)</button>
</div>

<div class="output" id="output"></div>

</div>
</div>

<script>

let format="comma"
let filter="unique"

document.querySelectorAll("[data-format]").forEach(el=>{
el.onclick=()=>{
document.querySelectorAll("[data-format]").forEach(e=>e.classList.remove("active"))
el.classList.add("active")
format=el.dataset.format
}
})

document.querySelectorAll("[data-filter]").forEach(el=>{
el.onclick=()=>{
document.querySelectorAll("[data-filter]").forEach(e=>e.classList.remove("active"))
el.classList.add("active")
filter=el.dataset.filter
}
})

function process(){

let raw=document.getElementById("inputArea").value

let list=raw
.split(/[\n,\s]+/)
.map(x=>x.replace(/['"]/g,"").trim())
.filter(x=>x)

let total=list.length

let count={}
list.forEach(v=>{
count[v]=(count[v]||0)+1
})

let unique=Object.keys(count)
let duplicates=unique.filter(v=>count[v]>1)
let onlyonce=unique.filter(v=>count[v]==1)

let working=[]

if(filter==="unique") working=unique
if(filter==="duplicate") working=duplicates
if(filter==="onlyonce") working=onlyonce

let formatted=working.map(v=>{
if(format==="single") return `'${v}',`
if(format==="double") return `"${v}",`
return `${v},`
})

let maxLen=Math.max(...formatted.map(x=>x.length),1)+6
let pad=str=>str+" ".repeat(maxLen-str.length)

let result=""

for(let i=0;i<formatted.length;i+=5){
result+=formatted.slice(i,i+5).map(pad).join("")+"\n"
}

document.getElementById("output").innerText=result.trimEnd()

document.getElementById("summary").innerHTML=`
จำนวนข้อมูลทั้งหมด : <strong>${total}</strong><br>
ค่าที่ไม่ซ้ำ : <strong>${unique.length}</strong><br>
จำนวนรายการที่ซ้ำ : <strong>${duplicates.length}</strong><br>
`

// ✅ อัปเดตจำนวนที่ปุ่ม
let btn=document.getElementById("copyBtn")
btn.innerText=`Copy (${working.length})`

}

function copyResult(){

let btn=document.getElementById("copyBtn")

let arr=document.getElementById("output").innerText
.split(/\s+/)
.filter(x=>x)
.join("")
.split(",")
.filter(x=>x)

let text=arr.join(",")

navigator.clipboard.writeText(text)

let count=arr.length

btn.classList.add("copy-success")
btn.innerText=`คัดลอกแล้ว ✓ (${count})`

setTimeout(()=>{
btn.classList.remove("copy-success")
btn.innerText=`Copy (${count})`
},1500)

}

</script>

</body>
</html>

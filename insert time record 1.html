<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Time Record Tool</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>

:root{
--bg:#050816;
--card:rgba(255,255,255,.06);
--stroke:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;
--primary:#3b82f6;
--primary2:#8b5cf6;
--success:#22c55e;
--shadow:0 25px 60px rgba(0,0,0,.45);
}

*{
margin:0;
padding:0;
}
*{
box-sizing:border-box;
}

body{
font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Text",
sans-serif;

background:
radial-gradient(circle at top left,#172554 0%,transparent 30%),
radial-gradient(circle at bottom right,#581c87 0%,transparent 30%),
linear-gradient(135deg,#030712,#0f172a);

min-height:100vh;
color:var(--text);
overflow-x:hidden;
padding:0px 12px 12px;
}

body::before{
content:"";
position:fixed;
inset:0;
backdrop-filter:blur(100px);
pointer-events:none;
}

.wrapper{
max-width:1450px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:-20px;
margin-bottom:8px;
flex-wrap:wrap;
gap:16px;
}

.logo{
font-size:34px;
font-weight:900;

background:
linear-gradient(90deg,#60a5fa,#c084fc);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:var(--muted);
margin-top:6px;
}

.status{
padding:10px 16px;
border-radius:999px;

background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);

font-size:13px;
font-weight:700;
}

.card{
background:var(--card);
border:1px solid var(--stroke);

border-radius:34px;

padding:30px;

backdrop-filter:blur(30px);

box-shadow:var(--shadow);
}

.tabs{
display:flex;
gap:14px;
margin-bottom:30px;
}

.tab{
flex:1;

padding:16px;

border-radius:18px;

cursor:pointer;

font-weight:800;
text-align:center;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.06);

transition:.22s;
}

.tab:hover{
transform:translateY(-2px);
}

.tab.active{
background:
linear-gradient(
135deg,
#2563eb,
#8b5cf6
);

border-color:transparent;

box-shadow:
0 12px 30px rgba(59,130,246,.35);
}

.section{
margin-bottom:28px;
}

.section-title{
font-size:18px;
font-weight:800;
margin-bottom:14px;

display:flex;
align-items:center;
gap:10px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));

gap:18px;
}

.field label{
display:block;

font-size:13px;
font-weight:700;

color:#cbd5e1;

margin-bottom:8px;
}

.field input,
.field select{

width:100%;

padding:14px 16px;

border:none;
outline:none;

border-radius:18px;

background:rgba(255,255,255,.05);

color:white;

font-size:14px;

transition:.22s;

box-shadow:
inset 0 0 0 1px rgba(255,255,255,.05);
}

.field input:focus,
.field select:focus{

background:rgba(255,255,255,.08);

box-shadow:
0 0 0 3px rgba(59,130,246,.25),
0 10px 30px rgba(59,130,246,.12);
}

.weekdays{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.day-btn{
padding:12px 18px;

border-radius:999px;

border:none;

background:rgba(255,255,255,.05);

color:white;

cursor:pointer;

font-weight:700;

transition:.2s;
}

.day-btn:hover{
transform:translateY(-2px);
}

.day-btn.active{
background:
linear-gradient(
135deg,
#ef4444,
#dc2626
);

box-shadow:
0 10px 25px rgba(239,68,68,.3);
}

details{
background:rgba(255,255,255,.03);

border:1px solid rgba(255,255,255,.05);

border-radius:22px;

padding:18px;
}

summary{
cursor:pointer;
font-weight:800;
font-size:15px;
}

.actions{

position:sticky;
bottom:20px;
z-index:10;

display:flex;
gap:14px;

margin-top:26px;

padding:16px;

border-radius:24px;

background:rgba(2,6,23,.7);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);
}

button{
border:none;
cursor:pointer;

padding:15px 24px;

border-radius:18px;

font-size:14px;
font-weight:800;

transition:.22s;
}

button:hover{
transform:translateY(-2px);
}

.primary{
background:
linear-gradient(
135deg,
#2563eb,
#8b5cf6
);

color:white;

box-shadow:
0 12px 30px rgba(59,130,246,.35);
}

.secondary{
background:
linear-gradient(
135deg,
#16a34a,
#22c55e
);

color:white;

box-shadow:
0 12px 30px rgba(34,197,94,.25);
}

textarea{
width:100%;
height:520px;

margin-top:24px;

padding:26px;

border:none;
outline:none;

resize:vertical;

border-radius:28px;

background:#020617;

color:#e2e8f0;

font-size:13px;
line-height:1.9;

font-family:
"SFMono-Regular",
Menlo,
Consolas,
monospace;

border:1px solid rgba(255,255,255,.06);

box-shadow:
inset 0 0 0 1px rgba(255,255,255,.03);
}

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:16px;

margin-bottom:12px;
}

.stat{
padding:22px;

border-radius:24px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.06);
}

.stat-label{
font-size:12px;
color:#cbd5e1;
margin-bottom:10px;
}

.stat-value{
font-size:32px;
font-weight:900;
}

.footer{
margin-top:24px;
text-align:center;
font-size:12px;
color:#64748b;
}

@media(max-width:900px){

body{
padding:16px;
}

.actions{
flex-wrap:wrap;
}

.tabs{
flex-direction:column;
}

.logo{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">

<div>
<div class="logo">⚡ Time Record Tool</div>
<div class="subtitle">
Generate SQL Faster • Modern UI
</div>
</div>

<div class="status">
🟢 System Ready
</div>

</div>

<div class="card">

<div class="tabs">
<div id="tabTime" class="tab active" onclick="showPage('time')">
⏰ Time Record
</div>

<div id="tabHoliday" class="tab" onclick="showPage('holiday')">
🎉 Add Holiday
</div>
<div id="tabLeave" class="tab" onclick="showPage('leave')">
📝 Leave SQL
</div>
</div>

<!-- TIME PAGE -->

<div id="timePage">

<div class="section">

<div class="section-title">
📅 วันที่ & เวลา
</div>

<div class="grid">

<div class="field">
<label>ช่วงวันที่</label>
<input id="dateRange">
</div>

<div class="field">
<label>เวลาเข้า</label>
<input type="time" id="timeIn" value="09:00">
</div>

<div class="field">
<label>เวลาออก</label>
<input type="time" id="timeOut" value="18:00">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
🚫 ยกเว้นวัน
</div>

<div class="weekdays">

<button class="day-btn" data-day="1">จันทร์</button>
<button class="day-btn" data-day="2">อังคาร</button>
<button class="day-btn" data-day="3">พุธ</button>
<button class="day-btn" data-day="4">พฤหัส</button>
<button class="day-btn" data-day="5">ศุกร์</button>
<button class="day-btn active" data-day="6">เสาร์</button>
<button class="day-btn active" data-day="0">อาทิตย์</button>

</div>

</div>

<div class="section">

<div class="section-title">
👤 พนักงาน
</div>

<div class="grid">

<div class="field">
<label>Badge ID</label>
<input id="x2">
</div>

<div class="field">
<label>Employee ID</label>
<input id="x3">
</div>

</div>

</div>

<div class="section">

<details>

<summary>
⚙️ System Config
</summary>

<br>

<div class="grid">

<div class="field">
<label>Schema</label>
<input id="schema" value="time">
</div>

<div class="field">
<label>Split In/Out</label>
<select id="splitFlag">
<option value="yes" selected>Yes</option>
<option value="no">No</option>
</select>
</div>

<div class="field">
<label>source</label>
<input id="source" value="15.00">
</div>

<div class="field">
<label>location_id</label>
<input id="location_id" value="5001.00">
</div>

<div class="field">
<label>status</label>
<input id="status" value="N">
</div>

<div class="field">
<label>machine_ip</label>
<input id="machine_ip" value="10.4.127.34">
</div>

<div class="field">
<label>machine_name_in</label>
<input id="machine_name_in" value="Korat-SLH1-3-In-01">
</div>

<div class="field">
<label>machine_name_out</label>
<input id="machine_name_out" value="Korat-SLH1-3-Out-01">
</div>

<div class="field">
<label>location_name</label>
<input id="location_name" value="CPF-แปรรูปไก่โคราช-5001">
</div>

<div class="field">
<label>set_id</label>
<input id="set_id" value="THAGR">
</div>

<div class="field">
<label>source_type</label>
<input id="source_type" value="time-device">
</div>

</div>

</details>

</div>

<div class="actions">

<button class="primary" onclick="generateSQL()">
⚡ Generate SQL
</button>

<button class="secondary" onclick="copySQL()">
📋 Copy
</button>

</div>

<textarea id="output" readonly></textarea>

</div>

<!-- HOLIDAY -->

<div id="holidayPage" style="display:none">

<div class="section">

<div class="section-title">
📅 วันที่
</div>

<div class="grid">

<div class="field">
<label>ช่วงวันที่</label>
<input id="holidayRange">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
👤 พนักงาน
</div>

<div class="grid">

<div class="field">
<label>Employee ID</label>
<input id="holidayEmp">
</div>

</div>

</div>

<div class="actions">

<button class="primary" onclick="genHoliday()">
⚡ Generate SQL
</button>

<button class="secondary" onclick="copyHoliday()">
📋 Copy
</button>

</div>

<textarea id="holidayOutput" readonly></textarea>
</div>

<!-- LEAVE -->

<div id="leavePage" style="display:none">

<div class="section">

<div class="section-title">
📅 วันที่ลา
</div>

<div class="grid">

<div class="field">
<label>ช่วงวันที่ลา</label>
<input id="leaveRange">
</div>

<div class="field">
<label>ประเภทลา</label>

<select id="leaveType">

<option value="TH_VAC_WP">
ลาจ่าย
</option>

<option value="TH_PER_UP">
ลาไม่จ่าย
</option>

</select>

</div>

</div>

</div>

<div class="section">

<div class="section-title">
👤 พนักงาน
</div>

<div class="grid">

<div class="field">
<label>Employee ID</label>
<input id="leaveEmp">
</div>

</div>

</div>

<div class="actions">

<button class="primary" onclick="genLeave()">
⚡ Generate SQL
</button>

<button class="secondary" onclick="copyLeave()">
📋 Copy
</button>

</div>

<textarea id="leaveOutput" readonly></textarea>

</div>
<div class="footer">
Built for enterprise workflow ⚡
</div>

</div>

<script>

function showPage(p){

timePage.style.display =
p==='time'
?'block'
:'none'

holidayPage.style.display =
p==='holiday'
?'block'
:'none'

leavePage.style.display =
p==='leave'
?'block'
:'none'

tabTime.classList.toggle(
'active',
p==='time'
)

tabHoliday.classList.toggle(
'active',
p==='holiday'
)

tabLeave.classList.toggle(
'active',
p==='leave'
)

document.getElementById('modeText')
.innerText=
p.toUpperCase()

}
flatpickr('#dateRange',{
mode:'range',
dateFormat:'Y-m-d'
})

flatpickr('#holidayRange',{
mode:'range',
dateFormat:'Y-m-d'
})
flatpickr('#leaveRange',{
mode:'range',
dateFormat:'Y-m-d'
})

const skipWeekdays=new Set([0,6])

document.querySelectorAll('.day-btn')
.forEach(btn=>{

btn.onclick=()=>{

btn.classList.toggle('active')

const d=Number(btn.dataset.day)

btn.classList.contains('active')
? skipWeekdays.add(d)
: skipWeekdays.delete(d)

}

})

function formatDate(date){

return date.getFullYear()
+ '-'
+ String(date.getMonth()+1)
.padStart(2,'0')
+ '-'
+ String(date.getDate())
.padStart(2,'0')

}

function generateSQL(){

if(!dateRange.value||!x2.value||!x3.value)
return alert('ข้อมูลไม่ครบ')

const schemaVal =
schema.value || 'time'

const split = splitFlag.value

let recordIn =
split==='yes'
? 'in'
: ''

let recordOut =
split==='yes'
? 'out'
: ''

const [s,e]=
dateRange.value.split(' to ')

let d=
new Date(s+"T00:00:00")

const end=
new Date((e||s)+"T00:00:00")

let out=''

while(d<=end){

if(skipWeekdays.has(d.getDay())){

d.setDate(d.getDate()+1)

continue

}

const day=formatDate(d)

out+=`

INSERT INTO "${schemaVal}".time_record(created_at, updated_at, identification_no, inout_flag, source, location_id, reference_code,
status, machine_ip, machine_name, location_name, set_id, empl_id, lat, lng, record_type, record_time, record_date, last_update, kafka_time, source_type, split_in_out)

VALUES ('${day} ${timeIn.value}:00.000000+00', '${day} ${timeIn.value}:00.000000+00','${x2.value}','0.00','${source.value}','${location_id.value}',
'${x2.value}','${status.value}','${machine_ip.value}','${machine_name_in.value}', '${location_name.value}', '${set_id.value}', '${x3.value}',NULL,NULL,NULL,
'${day} ${timeIn.value}:00+07', '${day} ${timeIn.value}:00+07', '${day} ${timeIn.value}:00+07', '${day} ${timeIn.value}:00+07','${source_type.value}','${recordIn}');


INSERT INTO "${schemaVal}".time_record(created_at, updated_at, identification_no, inout_flag, source, location_id, reference_code,
status, machine_ip, machine_name, location_name, set_id, empl_id, lat, lng, record_type, record_time, record_date, last_update, kafka_time, source_type, split_in_out)

VALUES ('${day} ${timeOut.value}:00.000000+00', '${day} ${timeOut.value}:00.000000+00','${x2.value}','1.00','${source.value}','${location_id.value}',
'${x2.value}','${status.value}','${machine_ip.value}','${machine_name_out.value}', '${location_name.value}', '${set_id.value}', '${x3.value}',NULL,NULL,NULL,
'${day} ${timeOut.value}:00+07', '${day} ${timeOut.value}:00+07', '${day} ${timeOut.value}:00+07', '${day} ${timeOut.value}:00+07','${source_type.value}','${recordOut}');

`

d.setDate(d.getDate()+1)

}

output.value=out.trim()

updateLines(output.value)

saveForm()

}

async function copySQL(){

await navigator.clipboard.writeText(
output.value
)

alert('Copied!')

}
function genHoliday(){

const emp=holidayEmp.value

const [s,e]=
holidayRange.value.split(' to ')

if(!emp||!s)
return alert('ข้อมูลไม่ครบ')

holidayOutput.value=`
UPDATE "time".timesheet
SET public_holiday_detail = jsonb_build_object(
'endDate', to_char(shift_date, 'YYYY-MM-DD'),
'beginDate', to_char(shift_date, 'YYYY-MM-DD'),
'holidayClass', 'FULL',
'holidayCalendarDetailCode', 'TH_BuddhistLent',
'holidayCalendarDetailName', jsonb_build_object(
'en', 'Buddhist Lent Day',
'local', 'วันเข้าพรรษา'
)
)
WHERE employee_id = '${emp}'
AND shift_date BETWEEN DATE '${s}' AND DATE '${e||s}';
`.trim()

updateLines(holidayOutput.value)

saveForm()

}

async function copyHoliday(){

await navigator.clipboard.writeText(
holidayOutput.value
)

alert('Copied!')

}
function randomCode(){

return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'
.replace(/[xy]/g,function(c){

const r = Math.random() * 16 | 0

const v =
c === 'x'
? r
: (r & 0x3 | 0x8)

return v.toString(16)

})

}

function genLeave(){

const employeeId =
leaveEmp.value

const leaveType =
document.getElementById('leaveType').value

const leaveRangeValue =
leaveRange.value

if(!employeeId || !leaveRangeValue)
return alert('ข้อมูลไม่ครบ')

const now =
new Date().toISOString()

const isPaid =
leaveType === 'TH_VAC_WP'

const [s,e] =
leaveRangeValue.split(' to ')

let current =
new Date(s+"T00:00:00")

const end =
new Date((e||s)+"T00:00:00")

let sql=''

while(current <= end){

const day =
formatDate(current)

const jsonData = [

{

"date": day,

"dayList": [

{

"day": day,

"paid": isPaid,

"type": "D"

}

],

"endDate": day,

"remarks": "",

"createdAt": now,

"deletedAt": null,

"leaveCode": leaveType,

"leaveHour": "8",

"leaveType": leaveType,

"startDate": day,

"updatedAt": now,

"employeeId": employeeId,

"approveDate": now,

"approveName": "axons-sqs-time-off-request",

"notArchived": 1,

"externalCode": randomCode(),

"approveStatus": "Approved",

"afterBreakTime": true,

"eventUpdatedAt": now,

"beforeBreakTime": true,

"calculationMethod": "working_days"

}

]

const jsonString =
JSON.stringify(jsonData, null, 2)
.replace(/'/g, "''")

sql += `

UPDATE "time".timesheet
SET employee_absence_detail = '${jsonString}'
WHERE employee_id = '${employeeId}'
AND shift_date = '${day}';

`

current.setDate(
current.getDate()+1
)

}

leaveOutput.value =
sql.trim()

updateLines(leaveOutput.value)

saveForm()

}

async function copyLeave(){

await navigator.clipboard.writeText(
leaveOutput.value
)

alert('Copied!')

}

function updateLines(text){

document.getElementById('lineCount')
.innerText=
text
.split('\n')
.length

}

function saveForm(){

const ids=[
'dateRange',
'timeIn',
'timeOut',
'x2',
'x3',
'schema',
'source',
'location_id',
'status',
'machine_ip',
'machine_name_in',
'machine_name_out',
'location_name',
'set_id',
'source_type',
'holidayRange',
'holidayEmp',
'leaveRange',
'leaveEmp',
'leaveType'
]

let data={}

ids.forEach(id=>{

const el=document.getElementById(id)

if(el)
data[id]=el.value

})

localStorage.setItem(
'timeTool',
JSON.stringify(data)
)

}

function loadForm(){

const raw=
localStorage.getItem('timeTool')

if(!raw) return

const data=JSON.parse(raw)

Object.keys(data).forEach(id=>{

const el=document.getElementById(id)

if(el)
el.value=data[id]

})

}

document
.querySelectorAll('input,select')
.forEach(el=>{

el.addEventListener(
'change',
saveForm
)

})

document.addEventListener(
'keydown',
e=>{

if(e.ctrlKey && e.key==='Enter'){

if(
timePage.style.display!=='none'
){

generateSQL()

}else if(
holidayPage.style.display!=='none'
){

genHoliday()

}else{

genLeave()

}

}

})

loadForm()

</script>

</body>
</html>

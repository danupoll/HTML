<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Time Record + Holiday</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
:root{
--bg:#f1f5f9;
--card:#ffffff;
--primary:#2563eb;
--green:#16a34a;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
}

*{box-sizing:border-box}

body{
margin:0;
padding:60px 20px;
background:var(--bg);
color:var(--text);
font-family:system-ui,monospace;
}

.wrapper{max-width:920px;margin:auto}

.header{margin-bottom:26px}

.header h1{margin:0;font-size:26px}

.header p{margin:6px 0 0;color:var(--muted)}

.card{
background:var(--card);
border-radius:18px;
padding:26px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
border:1px solid var(--border);
}

.section{margin-bottom:28px}

.section-title{
font-weight:700;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.field label{
display:block;
font-size:13px;
color:var(--muted);
margin-bottom:6px;
}

.field input,.field select{
width:100%;
padding:11px 12px;
border-radius:10px;
border:1px solid var(--border);
background:#fff;
font-family:monospace;
}

.weekdays{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.day-btn{
padding:8px 14px;
border-radius:999px;
border:1px solid var(--border);
background:#fff;
cursor:pointer;
font-weight:600;
}

.day-btn.active{
background:#fee2e2;
border-color:#fecaca;
color:#b91c1c;
}

.actions{
display:flex;
gap:12px;
margin-top:10px;
}

button{
padding:12px 20px;
border-radius:10px;
border:none;
font-weight:700;
cursor:pointer;
}

.primary{background:var(--primary);color:#fff}
.secondary{background:var(--green);color:#fff}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
text-align:center;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
cursor:pointer;
font-weight:700;
background:#fff;
}

.tab.active{
background:var(--primary);
color:#fff;
}

textarea{
width:100%;
height:420px;
margin-top:16px;
padding:16px;
border-radius:12px;
border:1px solid var(--border);
background:#f8fafc;
font-family:monospace;
font-size:13px;
resize:vertical;
}

summary{
cursor:pointer;
font-weight:700;
margin-bottom:12px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h1>Time Record & Holiday Tool</h1>
<p>รวม 2 ระบบในหน้าเดียว</p>
</div>

<div class="card">

<div class="tabs">
<div id="tabTime" class="tab active" onclick="showPage('time')">Time Record</div>
<div id="tabHoliday" class="tab" onclick="showPage('holiday')">Add Holiday</div>
</div>

<div id="timePage">

<div class="section">
<div class="section-title">📅 วันที่ & เวลา</div>

<div class="grid">

<div class="field">
<label>ช่วงวันที่</label>
<input id="dateRange">
</div>

<div class="field">
<label>เวลาเข้า</label>
<input type="time" id="timeIn" value="09:00">
</div>

<div class="field">
<label>เวลาออก</label>
<input type="time" id="timeOut" value="18:00">
</div>

</div>
</div>

<div class="section">
<div class="section-title">🚫 ยกเว้นวัน</div>

<div class="weekdays">
<button class="day-btn" data-day="1">จันทร์</button>
<button class="day-btn" data-day="2">อังคาร</button>
<button class="day-btn" data-day="3">พุธ</button>
<button class="day-btn" data-day="4">พฤหัส</button>
<button class="day-btn" data-day="5">ศุกร์</button>
<button class="day-btn active" data-day="6">เสาร์</button>
<button class="day-btn active" data-day="0">อาทิตย์</button>
</div>

</div>

<div class="section">

<div class="section-title">👤 พนักงาน</div>

<div class="grid">

<div class="field">
<label>Badge ID</label>
<input id="x2">
</div>

<div class="field">
<label>Employee ID</label>
<input id="x3">
</div>

<div class="field">
<label>Schema</label>
<input id="schema" value="time">
</div>

<div class="field">
<label>Split In/Out</label>
<select id="splitFlag">
<option value="yes" selected>Yes</option>
<option value="no">No</option>
</select>
</div>

</div>
</div>

<div class="section">

<details>

<summary>System Config</summary>

<div class="grid">

<div class="field">
<label>source</label>
<input id="source" value="15.00">
</div>

<div class="field">
<label>location_id</label>
<input id="location_id" value="5001.00">
</div>

<div class="field">
<label>status</label>
<input id="status" value="N">
</div>

<div class="field">
<label>machine_ip</label>
<input id="machine_ip" value="10.4.127.34">
</div>

<div class="field">
<label>machine_name_in</label>
<input id="machine_name_in" value="Korat-SLH1-3-In-01">
</div>

<div class="field">
<label>machine_name_out</label>
<input id="machine_name_out" value="Korat-SLH1-3-Out-01">
</div>

<div class="field">
<label>location_name</label>
<input id="location_name" value="CPF-แปรรูปไก่โคราช-5001">
</div>

<div class="field">
<label>set_id</label>
<input id="set_id" value="THAGR">
</div>

<div class="field">
<label>source_type</label>
<input id="source_type" value="time-device">
</div>

</div>

</details>

</div>

<div class="actions">
<button class="primary" onclick="generateSQL()">Generate SQL</button>
<button class="secondary" onclick="copySQL()">Copy</button>
</div>

<textarea id="output" readonly></textarea>

</div>

<div id="holidayPage" style="display:none">

<div class="section">
<div class="section-title">📅 วันที่</div>
<div class="grid">
<div class="field">
<label>ช่วงวันที่</label>
<input id="holidayRange">
</div>
</div>
</div>

<div class="section">
<div class="section-title">👤 พนักงาน</div>
<div class="grid">
<div class="field">
<label>Employee ID</label>
<input id="holidayEmp">
</div>
</div>
</div>

<div class="actions">
<button class="primary" onclick="genHoliday()">Generate SQL</button>
<button class="secondary" onclick="copyHoliday()">Copy</button>
</div>

<textarea id="holidayOutput" readonly></textarea>

</div>

</div>
</div>

<script>

function showPage(p){
timePage.style.display = p==='time'?'block':'none'
holidayPage.style.display = p==='holiday'?'block':'none'
tabTime.classList.toggle('active',p==='time')
tabHoliday.classList.toggle('active',p==='holiday')
}

flatpickr('#dateRange',{mode:'range',dateFormat:'Y-m-d'})
flatpickr('#holidayRange',{mode:'range',dateFormat:'Y-m-d'})

const skipWeekdays=new Set([0,6])

document.querySelectorAll('.day-btn').forEach(btn=>{
btn.onclick=()=>{
btn.classList.toggle('active')
const d=Number(btn.dataset.day)
btn.classList.contains('active')
? skipWeekdays.add(d)
: skipWeekdays.delete(d)
}
})

function formatDate(date){
return date.getFullYear() + '-' +
String(date.getMonth()+1).padStart(2,'0') + '-' +
String(date.getDate()).padStart(2,'0')
}

function generateSQL(){

if(!dateRange.value||!x2.value||!x3.value)
return alert('ข้อมูลไม่ครบ')

const schemaVal = schema.value || 'time'
const split = splitFlag.value

let recordIn = split==='yes' ? 'in' : ''
let recordOut = split==='yes' ? 'out' : ''

const [s,e]=dateRange.value.split(' to ')

let d=new Date(s+"T00:00:00")
const end=new Date((e||s)+"T00:00:00")

let out=''

while(d<=end){

if(skipWeekdays.has(d.getDay())){
d.setDate(d.getDate()+1)
continue
}

const day=formatDate(d)

out+=`

INSERT INTO "${schemaVal}".time_record(created_at, updated_at, identification_no, inout_flag, source, location_id, reference_code,
status, machine_ip, machine_name, location_name, set_id, empl_id, lat, lng, record_type, record_time, record_date, last_update, kafka_time, source_type, split_in_out)

VALUES ('${day} ${timeIn.value}:00.000000+00', '${day} ${timeIn.value}:00.000000+00','${x2.value}','0.00','${source.value}','${location_id.value}',
'${x2.value}','${status.value}','${machine_ip.value}','${machine_name_in.value}', '${location_name.value}', '${set_id.value}', '${x3.value}',NULL,NULL,NULL,
'${day} ${timeIn.value}:00+07', '${day} ${timeIn.value}:00+07', '${day} ${timeIn.value}:00+07', '${day} ${timeIn.value}:00+07','${source_type.value}','${recordIn}');


INSERT INTO "${schemaVal}".time_record(created_at, updated_at, identification_no, inout_flag, source, location_id, reference_code,
status, machine_ip, machine_name, location_name, set_id, empl_id, lat, lng, record_type, record_time, record_date, last_update, kafka_time, source_type, split_in_out)

VALUES ('${day} ${timeOut.value}:00.000000+00', '${day} ${timeOut.value}:00.000000+00','${x2.value}','1.00','${source.value}','${location_id.value}',
'${x2.value}','${status.value}','${machine_ip.value}','${machine_name_out.value}', '${location_name.value}', '${set_id.value}', '${x3.value}',NULL,NULL,NULL,
'${day} ${timeOut.value}:00+07', '${day} ${timeOut.value}:00+07', '${day} ${timeOut.value}:00+07', '${day} ${timeOut.value}:00+07','${source_type.value}','${recordOut}');

`

d.setDate(d.getDate()+1)

}

output.value=out.trim()

}

function copySQL(){
output.select()
document.execCommand('copy')
}

function genHoliday(){

const emp=holidayEmp.value
const [s,e]=holidayRange.value.split(' to ')

if(!emp||!s)return alert('ข้อมูลไม่ครบ')

holidayOutput.value=`
UPDATE "time".timesheet
SET public_holiday_detail = jsonb_build_object(
  'endDate', to_char(shift_date, 'YYYY-MM-DD'),
  'beginDate', to_char(shift_date, 'YYYY-MM-DD'),
  'holidayClass', 'FULL',
  'holidayCalendarDetailCode', 'TH_BuddhistLent',
  'holidayCalendarDetailName', jsonb_build_object(
    'en', 'Buddhist Lent Day',
    'local', 'วันเข้าพรรษา'
  )
)
WHERE employee_id = '${emp}'
AND shift_date BETWEEN DATE '${s}' AND DATE '${e||s}';
`.trim()

}

function copyHoliday(){
holidayOutput.select()
document.execCommand('copy')
}

</script>

</body>
</html>

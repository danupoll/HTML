<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Tools</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='0.9em' font-size='100'>🧩</text>
</svg>">

<style>

:root{
--bg1:#0f172a;
--bg2:#020617;
--glass:rgba(15,23,42,.72);
--border:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;
--blue:#3b82f6;
--blue2:#60a5fa;
--hover:rgba(255,255,255,.08);
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Text",
"Helvetica Neue",
Arial;

background:
radial-gradient(circle at top left,#1e293b 0%,#0f172a 45%,#020617 100%);

overflow:hidden;
}

/* ===== TOPBAR ===== */

.topbar{

height:74px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 18px;

background:rgba(15,23,42,.65);

backdrop-filter:blur(14px);

border-bottom:1px solid var(--border);

position:relative;
z-index:100;

box-shadow:
0 10px 35px rgba(0,0,0,.28);

}

/* ===== LOGO ===== */

.logoWrap{
display:flex;
align-items:center;
gap:12px;
}

.logoIcon{

width:42px;
height:42px;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;

background:
linear-gradient(135deg,#2563eb,#60a5fa);

box-shadow:
0 8px 20px rgba(37,99,235,.35);

}

.logoText{
color:white;
font-size:18px;
font-weight:700;
letter-spacing:.3px;
}

/* ===== BUTTON ===== */

.topbar button{

border:none;
outline:none;

cursor:pointer;

padding:11px 18px;

border-radius:16px;

font-size:14px;
font-weight:600;

color:white;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

transition:
all .16s ease;

}

.topbar button:hover{

transform:translateY(-2px);

background:rgba(255,255,255,.12);

}

/* ===== MENU BTN ===== */

.menuBtn{

background:
linear-gradient(135deg,#3b82f6,#2563eb) !important;

box-shadow:
0 10px 22px rgba(37,99,235,.35);

}

/* ===== RIGHT ===== */

.rightMenu{
display:flex;
gap:10px;
}

.trcBtn{

background:
linear-gradient(135deg,#f9a8d4,#f472b6) !important;

color:#831843 !important;

font-weight:700;

}

/* ===== POPUP ===== */

.popupMenu{

position:absolute;

top:88px;
left:18px;

width:760px;
max-width:calc(100vw - 36px);

padding:18px;

display:none;

grid-template-columns:
repeat(3,1fr);

gap:14px;

background:rgba(15,23,42,.82);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

box-shadow:
0 25px 60px rgba(0,0,0,.30);

animation:popup .18s ease;

z-index:999;
}

.popupMenu.show{
display:grid;
}

@keyframes popup{

from{
opacity:0;
transform:
translateY(-10px)
scale(.98);
}

to{
opacity:1;
transform:
translateY(0)
scale(1);
}

}

/* ===== CARD ===== */

.menuCard{

border:none;
outline:none;

cursor:pointer;

min-height:92px;

padding:16px;

border-radius:22px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.05);

display:flex;
flex-direction:column;
justify-content:center;
align-items:flex-start;

gap:8px;

transition:
all .16s ease;

color:white;
}

.menuCard:hover{

transform:
translateY(-3px);

background:rgba(255,255,255,.10);

border-color:
rgba(255,255,255,.10);

}

.menuCard.active{

background:
linear-gradient(
135deg,
#2563eb,
#60a5fa
);

box-shadow:
0 14px 30px rgba(37,99,235,.30);

}

.menuIcon{
font-size:24px;
}

.menuTitle{
font-size:14px;
font-weight:700;
}

.menuDesc{
font-size:12px;
color:#cbd5e1;
line-height:1.4;
}

/* ===== VIEWER ===== */

.viewer{

width:100%;
height:calc(100vh - 74px);

border:none;

display:none;

background:white;

}

.viewer.active{
display:block;
animation:fade .2s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(6px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ===== MOBILE ===== */

@media(max-width:900px){

.popupMenu{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:640px){

.logoText{
display:none;
}

.popupMenu{
grid-template-columns:1fr;
}

.topbar{
padding:0 12px;
}

}

</style>

</head>

<body>

<!-- ===== TOPBAR ===== -->

<div class="topbar">

<div class="logoWrap">

<div class="logoIcon">
🧩
</div>

<div class="logoText">
My Tools
</div>

<button class="menuBtn" onclick="toggleMenu()">
 Menu
</button>

</div>

<div class="rightMenu">

<button
  class="trcBtn"
  onclick="window.open('https://danupoll.github.io/HTML/TRC.html', '_blank')"
>
  📥 TRC Incentive
</button>

</div>

</div>

<!-- ===== POPUP MENU ===== -->

<div class="popupMenu" id="popupMenu">

<button class="menuCard" onclick="showPage('page1',this)">
<div class="menuIcon">📝</div>
<div class="menuTitle">Query Format</div>
<div class="menuDesc">
จัด format query ให้พร้อมใช้งาน
</div>
</button>

<button class="menuCard" onclick="showPage('page2',this)">
<div class="menuIcon">⏱️</div>
<div class="menuTitle">Insert Time Record</div>
<div class="menuDesc">
สร้าง time record ได้เร็วขึ้น
</div>
</button>

<button class="menuCard" onclick="showPage('page3',this)">
<div class="menuIcon">💰</div>
<div class="menuTitle">EC Payroll</div>
<div class="menuDesc">
จัดการ payroll และ calculation
</div>
</button>

<button class="menuCard" onclick="showPage('page4',this)">
<div class="menuIcon">🔳</div>
<div class="menuTitle">QR Code</div>
<div class="menuDesc">
สร้าง QR Code ทันที
</div>
</button>

<button class="menuCard" onclick="showPage('page7',this)">
<div class="menuIcon">✂️</div>
<div class="menuTitle">Cut</div>
<div class="menuDesc">
ตัดข้อความและ format ข้อมูล
</div>
</button>

<button class="menuCard" onclick="showPage('page8',this)">
<div class="menuIcon">🪷</div>
<div class="menuTitle">วันพระ-Holiday</div>
<div class="menuDesc">
ดูวันหยุดและวันพระ
</div>
</button>

<button class="menuCard" onclick="showPage('page9',this)">
<div class="menuIcon">💸</div>
<div class="menuTitle">TRC Incentive</div>
<div class="menuDesc">
ค้นหาข้อมูลที่ผูกใน TRC Incentive
</div>
</button>

<button class="menuCard" onclick="showPage('page6',this)">
<div class="menuIcon">🔌</div>
<div class="menuTitle">API Template</div>
<div class="menuDesc">
Template สำหรับ API
</div>
</button>

<button class="menuCard" onclick="openAI()">
<div class="menuIcon">⭐️</div>
<div class="menuTitle">ถาม AI</div>
<div class="menuDesc">
เปิด NotebookLM
</div>
</button>

</div>

<!-- ===== IFRAME ===== -->

<iframe id="page1" class="viewer" src="Query Format 2.html"></iframe>
<iframe id="page2" class="viewer" src="insert time record 1.html"></iframe>
<iframe id="page3" class="viewer" src="EC Payroll2.html"></iframe>
<iframe id="page4" class="viewer" src="QR Code.html"></iframe>
<iframe id="page7" class="viewer" src="cut.html"></iframe>
<iframe id="page5" class="viewer" src="Error.html"></iframe>
<iframe id="page6" class="viewer" src="API_Template.html"></iframe>
<iframe id="page8" class="viewer" src="next_holiday.html"></iframe>
<iframe id="page9" class="viewer" src="TRC.html"></iframe>

<script>

/* ===== DOWNLOAD ===== */

function downloadTRC(){

const link=document.createElement("a")

link.href="TRC_Incentive.csv"
link.download="TRC_Incentive.csv"

link.click()

}

/* ===== AI ===== */

function openAI(){

window.open(
"https://notebooklm.google.com/notebook/8f036a18-928c-4f9b-89b1-c24710e1e3d7?authuser=1",
"_blank"
)

}

/* ===== TOGGLE MENU ===== */

function toggleMenu(){

document
.getElementById("popupMenu")
.classList.toggle("show")

}

/* ===== SHOW PAGE ===== */

function showPage(pageId,btn){

localStorage.setItem("lastPage",pageId)

/* iframe */

document
.querySelectorAll(".viewer")
.forEach(v=>{

v.classList.remove("active")

})

document
.getElementById(pageId)
.classList.add("active")

/* active menu */

document
.querySelectorAll(".menuCard")
.forEach(card=>{

card.classList.remove("active")

})

btn.classList.add("active")

/* close popup */

document
.getElementById("popupMenu")
.classList.remove("show")

}

/* ===== LOAD LAST ===== */

window.onload=function(){

const last=
localStorage.getItem("lastPage")

if(last){

document
.getElementById(last)
.classList.add("active")

document
.querySelectorAll(".menuCard")
.forEach(card=>{

if(
card.getAttribute("onclick") &&
card.getAttribute("onclick").includes(last)
){

card.classList.add("active")

}

})

}else{

document
.getElementById("page1")
.classList.add("active")

document
.querySelector(".menuCard")
.classList.add("active")

}

}

/* ===== CLICK OUTSIDE ===== */

window.addEventListener("click",function(e){

if(
!e.target.closest(".popupMenu") &&
!e.target.closest(".menuBtn")
){

document
.getElementById("popupMenu")
.classList.remove("show")

}

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>My Tools</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='0.9em' font-size='100'>🧩</text>
</svg>">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial;
background:#f1f5f9;
}

.topbar .trcBtn{
background:#f9a8d4;
color:#831843;
}

.topbar .trcBtn:hover{
background:#f472b6;
}

/* ===== TOPBAR ===== */

.topbar{
background:#1e293b;
height:56px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.leftMenu{
display:flex;
gap:8px;
align-items:center;
}

.rightMenu{
display:flex;
gap:8px;
}

/* ===== BUTTON ===== */

.topbar button{
background:#334155;
border:none;
color:white;
padding:7px 14px;
border-radius:8px;
cursor:pointer;
font-size:14px;
transition:all .15s ease;
}

.topbar button:hover{
background:#475569;
}

.topbar button.active{
background:#2563eb;
}

/* ===== VIEWER ===== */

.viewer{
width:100%;
height:calc(100vh - 56px);
border:none;
display:none;
}

.viewer.active{
display:block;
}

/* ===== DROPDOWN ===== */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:38px;
left:0;
background:white;
min-width:180px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
overflow:hidden;
z-index:999;
}

.dropdown-content button{
width:100%;
background:white;
border:none;
padding:10px 12px;
text-align:left;
cursor:pointer;
font-size:14px;
color:#0f172a;
}

.dropdown-content button:hover{
background:#f1f5f9;
}

.dropdown.show .dropdown-content{
display:block;
}

</style>

</head>

<body>

<div class="topbar">

<div class="leftMenu">

<button onclick="showPage('page1',this)">Query Format</button>
<button onclick="showPage('page2',this)">Insert Time Record</button>
<button onclick="showPage('page3',this)">EC Payroll</button>
<button onclick="showPage('page4',this)">QR Code</button>
<button onclick="showPage('page5',this)">Holiday</button>
<button onclick="showPage('page6',this)">API-Template</button>
<button onclick="openAI()">⭐️ ถาม AI</button>

</div>

<div class="rightMenu">

<button class="trcBtn" onclick="downloadTRC()">TRC Incentive (07/04/2026)</button>

</div>

</div>

<iframe id="page1" class="viewer" src="Query Format 2.html"></iframe>
<iframe id="page2" class="viewer" src="insert time record 1.html"></iframe>
<iframe id="page3" class="viewer" src="EC Payroll2.html"></iframe>
<iframe id="page4" class="viewer" src="QR Code.html"></iframe>
<iframe id="page5" class="viewer" src="next_holiday.html"></iframe>
<iframe id="page6" class="viewer" src="API_Template.html"></iframe>

<script>

function downloadTRC(){
const link = document.createElement("a")
link.href = "TRC_Incentive.csv"
link.download = "TRC_Incentive.csv"
link.click()
}

function openAI(){
window.open(
"https://notebooklm.google.com/notebook/8f036a18-928c-4f9b-89b1-c24710e1e3d7?authuser=1",
"_blank"
);
}

function showPage(pageId,btn){

localStorage.setItem("lastPage",pageId)

document.querySelectorAll(".viewer").forEach(v=>{
v.classList.remove("active")
})

document.getElementById(pageId).classList.add("active")

document.querySelectorAll(".leftMenu button").forEach(b=>{
b.classList.remove("active")
})

btn.classList.add("active")

}

/* ===== โหลด tab ล่าสุด ===== */

window.onload=function(){

const last=localStorage.getItem("lastPage")

if(last){

document.getElementById(last).classList.add("active")

const buttons=document.querySelectorAll(".leftMenu button")

buttons.forEach(b=>{
if(b.getAttribute("onclick").includes(last)){
b.classList.add("active")
}
})

}else{

document.getElementById("page1").classList.add("active")
document.querySelector(".leftMenu button").classList.add("active")

}

}

/* ===== DROPDOWN ===== */

function toggleDropdown(){
document.querySelector(".dropdown").classList.toggle("show")
}

window.addEventListener("click",function(e){

if(!e.target.closest(".dropdown")){
document.querySelectorAll(".dropdown").forEach(d=>{
d.classList.remove("show")
})
}

})

</script>

</body>
</html>

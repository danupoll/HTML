<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payroll CSV Mapper</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<style>

:root{
--bg:#050816;
--bg2:#0b1120;

--card:rgba(15,23,42,0.72);

--border:rgba(139,92,246,0.16);

--text:#e2e8f0;
--muted:#94a3b8;

--primary:#8b5cf6;
--primary2:#6366f1;
}

*{
box-sizing:border-box;
}

body{

margin:0;

font-family:
Inter,
system-ui,
sans-serif;

background:
radial-gradient(circle at top left,
rgba(139,92,246,0.18),
transparent 28%),

radial-gradient(circle at bottom right,
rgba(99,102,241,0.16),
transparent 30%),

linear-gradient(
135deg,
#050816 0%,
#0b1120 45%,
#020617 100%
);

background-attachment:fixed;

color:var(--text);

padding:16px;

}

/* ===== TOPBAR ===== */

.topbar{

position:fixed;

top:0;
left:0;

width:100%;
height:50px;

background:rgba(2,6,23,0.72);

backdrop-filter:blur(16px);

border-bottom:
1px solid rgba(139,92,246,0.15);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 18px;

z-index:9999;

}

.logo{

font-size:15px;

font-weight:800;

color:#c4b5fd;

text-shadow:
0 0 20px rgba(139,92,246,0.35);

}

.menu{

display:flex;
gap:8px;

}

.menu a{

color:#e2e8f0;

text-decoration:none;

font-size:12px;

padding:6px 10px;

border-radius:10px;

transition:0.18s;

}

.menu a:hover{

background:
rgba(139,92,246,0.14);

}

/* ===== MAIN ===== */

.wrapper{

max-width:1700px;

margin:auto;

padding-top:58px;

}

.card{

background:var(--card);

border:1px solid var(--border);

backdrop-filter:blur(18px);

border-radius:22px;

box-shadow:
0 10px 40px rgba(0,0,0,0.45),
inset 0 1px 0 rgba(255,255,255,0.03);

}

/* ===== HEADER ===== */

.header{

padding:18px 22px;

margin-bottom:16px;

display:flex;

justify-content:space-between;

align-items:center;

gap:16px;

flex-wrap:wrap;

}

.title{

font-size:30px;

font-weight:900;

color:#c4b5fd;

text-shadow:
0 0 25px rgba(139,92,246,0.35);

}

.subtitle{

margin-top:4px;

font-size:13px;

color:var(--muted);

}

/* ===== BUTTON ===== */

.actions{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.btn{

border:0;

padding:10px 14px;

border-radius:14px;

font-weight:700;

font-size:13px;

cursor:pointer;

transition:0.18s;

color:white;

}

.btn:hover{

transform:translateY(-2px);

}

.btn-import{

background:
linear-gradient(
135deg,
#7c3aed,
#6366f1
);

box-shadow:
0 8px 24px rgba(99,102,241,0.30);

}

.btn-download{

background:
linear-gradient(
135deg,
#059669,
#10b981
);

box-shadow:
0 8px 24px rgba(16,185,129,0.24);

}

/* ===== FILE INPUT ===== */

.filebox{

display:flex;

align-items:center;

gap:10px;

flex-wrap:wrap;

margin-top:10px;

}

input[type=file]{

background:#020617;

border:1px solid rgba(139,92,246,0.15);

color:#cbd5e1;

padding:10px 12px;

border-radius:14px;

min-width:260px;

font-size:13px;

}

/* ===== RESULT ===== */

.resultbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 20px;

margin-bottom:14px;

gap:18px;

flex-wrap:wrap;

}

.result-label{

font-size:11px;

color:#94a3b8;

margin-bottom:4px;

}

.result-count{

font-size:28px;

font-weight:900;

color:#c4b5fd;

}

/* ===== TABLE ===== */

.table-wrap{

overflow:auto;

max-height:78vh;

border-radius:22px;

}

table{

width:100%;

border-collapse:collapse;

font-size:12px;

}

thead{

position:sticky;

top:0;

z-index:50;

}

th{

background:#111827;

color:#c4b5fd;

font-weight:800;

padding:12px;

white-space:nowrap;

border-bottom:
1px solid rgba(139,92,246,0.18);

}

td{

padding:10px 12px;

border-bottom:
1px solid rgba(255,255,255,0.04);

white-space:nowrap;

color:#e2e8f0;

}

tr{

transition:0.16s;

}

tbody tr:hover{

background:
linear-gradient(
90deg,
rgba(99,102,241,0.10),
rgba(139,92,246,0.10)
);

}

/* ===== SCROLLBAR ===== */

::-webkit-scrollbar{
width:10px;
height:10px;
}

::-webkit-scrollbar-thumb{

background:
linear-gradient(
to bottom,
#8b5cf6,
#6366f1
);

border-radius:999px;

}

::-webkit-scrollbar-track{

background:#020617;

}

/* ===== MOBILE ===== */

@media(max-width:768px){

.title{
font-size:24px;
}

.header{
padding:16px;
}

.result-count{
font-size:24px;
}

.actions{
width:100%;
}

.btn{
flex:1;
}

input[type=file]{
width:100%;
min-width:unset;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->



<div class="wrapper">

<!-- HEADER -->

<div class="card header">

<div>

<div class="title">
📊 Payroll CSV Mapper
</div>

<div class="subtitle">
Import CSV / XLSX → Auto Mapping → Export Result
</div>

<div class="filebox">

<input
type="file"
id="file"
accept=".csv,.xlsx"
>

</div>

</div>

<div class="actions">

<button
class="btn btn-import"
onclick="loadCSV()"
>
⚡ Import
</button>

<button
class="btn btn-download"
onclick="downloadXLSX()"
>
⬇ Download
</button>

</div>

</div>

<!-- RESULT -->

<div class="card resultbar">

<div>

<div class="result-label">
TOTAL ROWS
</div>

<div
class="result-count"
id="totalRows"
>
0
</div>

</div>

<div style="color:#94a3b8;font-size:13px">
Mapped Payroll Result
</div>

</div>

<!-- TABLE -->

<div class="card table-wrap">

<table id="table"></table>

</div>

</div>

<script>

let resultData = [];
let originalFileName = "";

/* ---------- Date normalize ---------- */

function normalizeDate(val){

if(!val) return "";

if(val instanceof Date){
return val.toISOString().slice(0,10);
}

let s = String(val).trim();

s = s.split(" ")[0];

const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);

if(dmy){

return `${dmy[3]}-${dmy[2].padStart(2,"0")}-${dmy[1].padStart(2,"0")}`;

}

const ymd = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);

if(ymd){

return `${ymd[1]}-${ymd[2].padStart(2,"0")}-${ymd[3].padStart(2,"0")}`;

}

return s;

}

function getEmployeeType(start,end){

if(!start || !end) return "";

const s = new Date(start);

const e = new Date(end);

const diffDays =
Math.floor((e - s)/(1000*60*60*24)) + 1;

if(diffDays <= 16) return "DAILY";

if(diffDays >= 28) return "MONTHLY";

return "";

}

function loadCSV(){

const file =
document.getElementById("file").files[0];

if(!file)
return alert("เลือกไฟล์ก่อน");

originalFileName =
file.name.replace(/\.[^/.]+$/, "");

const reader = new FileReader();

if(file.name.toLowerCase().endsWith(".xlsx")){

reader.onload = e=>{

const data =
new Uint8Array(e.target.result);

const wb =
XLSX.read(data,{type:"array"});

const sheet =
wb.Sheets[wb.SheetNames[0]];

const rows =
XLSX.utils.sheet_to_json(
sheet,
{
header:1,
raw:false
}
);

mapData(rows);

};

reader.readAsArrayBuffer(file);

}else{

reader.onload = e=>{

const text =
e.target.result.trim();

const rows =
text
.split(/\r?\n/)
.map(r => r.split(","));

mapData(rows);

};

reader.readAsText(file);

}

}

function mapData(rows){

const HEADER_ROW = 6;

const COL_EMP = 0;
const COL_PIN = 2;
const COL_GP  = 4;
const COL_PI  = 5;
const COL_WG  = 6;
const COL_DOC = 8;

const PERIOD =
rows[3]?.[1] || "";

const [rawStart="", rawEnd=""] =
PERIOD.split("-").map(v=>v.trim());

const start = normalizeDate(rawStart);

const end   = normalizeDate(rawEnd);

const EMP_TYPE =
getEmployeeType(start,end);

const result = [];

for(let r = HEADER_ROW+1; r < rows.length; r++){

const row = rows[r] || [];

const emp = row[COL_EMP];
const pin = row[COL_PIN];
const gp  = row[COL_GP];
const pi  = row[COL_PI];
const wg  = row[COL_WG];
const doc = row[COL_DOC];

if([emp,pin,gp,pi,wg,doc]
.every(v=>!v)) continue;

result.push({

EMPLID: emp || "",

PIN_NM: pin || "",

PI_TYPE: pi || "",

GP_VAL: gp || "",

WORKGROUPCODE: wg || "",

EMPLOYEETYPE: EMP_TYPE,

PRD_BGN_DT: start,

PRD_END_DT: end,

DOC_REFNO: doc || "",

LASTUPDOPRID: "Worklife"

});

}

resultData = result;

render(resultData);

document.getElementById("totalRows")
.textContent =
resultData.length.toLocaleString();

}

function render(data){

const table =
document.getElementById("table");

table.innerHTML = "";

if(!data.length) return;

const headers =
Object.keys(data[0]);

const thead =
document.createElement("thead");

const trh =
document.createElement("tr");

headers.forEach(h=>{

const th =
document.createElement("th");

th.textContent = h;

trh.appendChild(th);

});

thead.appendChild(trh);

table.appendChild(thead);

const tbody =
document.createElement("tbody");

data.forEach(row=>{

const tr =
document.createElement("tr");

headers.forEach(h=>{

const td =
document.createElement("td");

td.textContent = row[h];

tr.appendChild(td);

});

tbody.appendChild(tr);

});

table.appendChild(tbody);

}

function downloadXLSX(){

if(!resultData.length)
return alert("ยังไม่มีข้อมูล");

const ws =
XLSX.utils.json_to_sheet(resultData);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Result"
);

const first =
resultData[0] || {};

const start =
String(first.PRD_BGN_DT || "");

const end =
String(first.PRD_END_DT || "");

let suffix = "";

if(start.length >= 10 &&
end.length >= 10){

const s = start.split("-");
const e = end.split("-");

const startFmt =
s[2] + s[1] + s[0];

const endFmt =
e[2] + e[1] + e[0];

suffix =
"_" + startFmt + "-" + endFmt;

}

const baseName =
originalFileName || "output";

const fileName =
baseName + suffix + ".xlsx";

XLSX.writeFile(wb,fileName);

}

</script>

</body>
</html>

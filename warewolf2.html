<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; background:#f8fafc; text-align:center; }
.container { max-width:420px; margin:auto; }

input {
  padding:12px; margin:5px; width:90%;
  border-radius:10px; border:1px solid #ccc;
}

button {
  padding:8px 10px; margin:3px;
  border:none; border-radius:10px;
}

.primary { background:#3b82f6; color:white; }
.danger { background:#ef4444; color:white; }

.row {
  padding:10px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.red {
  background: #fecaca;
  color: #7f1d1d;
}
.blue {
  background:#bfdbfe;
  color:#1e3a8a;
}
.active-heart { background:pink; }
.active-shield { background:gold; }
</style>
</head>

<body>
<div class="container">

<div id="setup">
  <h3>ใส่ชื่อ 10 คน</h3>
  <div id="inputs"></div>
  <button class="primary" onclick="start()">เริ่ม</button>
</div>

<div id="result" style="display:none">
  <h3>สรุป</h3>
  <div id="list"></div>
  <button class="primary" onclick="restart()">สุ่มใหม่</button>
  <button class="danger" onclick="exitGame()">ออก</button>
</div>

</div>

<script>
let players=[], gameResult=[];

const ROLES = [
"บอดี้การ์ด","นักสืบ","หมอดู",
"หมาป่า","หมาป่า","ชาวบ้าน","ชาวบ้าน","มือปืน","ผู้ติดเชื้อ","คู่รัก"
];

// ===== INIT =====
function init(){
  let html="";
  for(let i=0;i<10;i++){
    html+=`<input id="p${i}" placeholder="ชื่อ ${i+1}"><br>`;
  }
  inputs.innerHTML=html;
}

// ===== START =====
function start(){
  players=[];
  for(let i=0;i<10;i++){
    let val = document.getElementById("p"+i).value;
    if(val) players.push(val);
  }

  if(players.length < 7){
    alert("ต้องมีอย่างน้อย 8 คน");
    return;
  }

  shuffle(players);

  let activeRoles = ROLES.slice(0, players.length);

  gameResult = activeRoles.map((role,i)=>({
    name: players[i],
    role: role,
    deadState: 0,
    heart:false,
    shield:false,
    infectedActive:false
  }));

  save();
  show();
}

// ===== SHOW =====
function show(){
  setup.style.display="none";
  result.style.display="block";

  let html="";
  gameResult.forEach((p,i)=>{

    let bgClass="";
    if(p.deadState===1) bgClass="red";
    if(p.deadState===2) bgClass="blue";

    let roleColor="black";
    if(p.role==="หมาป่า") roleColor="red";
    if(p.role==="ผู้ติดเชื้อ" && p.infectedActive) roleColor="red";

    html+=`
    <div class="row ${bgClass}">
      <div style="text-align:left; color:${roleColor}; cursor:pointer"
           onclick="${p.role==='ผู้ติดเชื้อ' ? `toggleInfected(${i})` : ''}">
        ${p.name} - ${p.role}
      </div>

      <div>
        <button onclick="toggle(${i},'heart')" class="${p.heart?'active-heart':''}">❤️</button>
        <button onclick="toggle(${i},'shield')" class="${p.shield?'active-shield':''}">🛡️</button>
        <button onclick="toggleDead(${i})">☠️</button>
      </div>
    </div>`;
  });

  list.innerHTML=html;
}

// ===== TOGGLE =====
function toggle(i,type){
  gameResult[i][type]=!gameResult[i][type];
  save();
  show();
}

function toggleDead(i){
  gameResult[i].deadState = (gameResult[i].deadState + 1) % 3;
  save();
  show();
}

function toggleInfected(i){
  gameResult[i].infectedActive = !gameResult[i].infectedActive;
  save();
  show();
}

// ===== CONTROL =====
function restart(){
  if(!confirm("ยืนยันจะสุ่มใหม่? ข้อมูลเดิมจะหายนะ")) return;

  shuffle(players);

  let activeRoles = ROLES.slice(0, players.length);

  gameResult = activeRoles.map((role,i)=>({
    name: players[i],
    role: role,
    deadState: 0,
    heart:false,
    shield:false,
    infectedActive:false
  }));

  save();
  show();
}

function exitGame(){
  localStorage.clear();
  location.reload();
}

// ===== SAVE =====
function save(){
  localStorage.setItem("wolf", JSON.stringify({players,gameResult}));
}

function load(){
  let data = JSON.parse(localStorage.getItem("wolf"));
  if(!data) return;
  players=data.players;
  gameResult=data.gameResult;
  show();
}

// ===== UTIL =====
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

init();
load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSV Smart Search</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body{
      background:
        radial-gradient(circle at top left,#dbeafe 0%,transparent 25%),
        radial-gradient(circle at bottom right,#e9d5ff 0%,transparent 25%),
        #f8fafc;
    }

    .glass{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.5);
    }

    ::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    ::-webkit-scrollbar-thumb{
      background:#cbd5e1;
      border-radius:999px;
    }

    .table-row:hover{
      background:#eef2ff;
      transition:0.15s;
    }
  </style>
</head>

<body class="min-h-screen text-slate-800">

<div class="max-w-7xl mx-auto px-4 py-8">

  <!-- HEADER -->
  <div class="glass rounded-3xl shadow-2xl p-6 mb-6">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">

      <div>
        <h1 class="text-4xl font-black text-indigo-700">
          🔎 CSV Smart Search
        </h1>

        <p class="text-slate-500 mt-2">
          ค้นหา • Filter • Sort • โหลด CSV จาก GitHub Repo อัตโนมัติ
        </p>
      </div>

      <div class="flex gap-3 flex-wrap">

        <button
          id="clearBtn"
          class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-3 rounded-2xl font-bold shadow-lg"
        >
          ล้าง Filter
        </button>

        <button
          id="exportBtn"
          class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-2xl font-bold shadow-lg"
        >
          Export CSV
        </button>

      </div>

    </div>
  </div>

  <!-- SEARCH -->
  <div class="grid grid-cols-1 lg:grid-cols-4 gap-5 mb-6">

    <div class="glass rounded-3xl p-5 shadow-xl lg:col-span-2">

      <div class="font-bold text-slate-500 text-sm mb-2">
        GLOBAL SEARCH
      </div>

      <input
        type="text"
        id="searchInput"
        placeholder="ค้นหาได้ทุกคอลัมน์..."
        class="w-full px-5 py-4 rounded-2xl bg-slate-100 outline-none focus:ring-4 focus:ring-indigo-300 text-lg"
      />

    </div>

    <div class="glass rounded-3xl p-5 shadow-xl">

      <div class="font-bold text-slate-500 text-sm mb-2">
        FILTER COLUMN
      </div>

      <select
        id="columnSelect"
        class="w-full px-4 py-4 rounded-2xl bg-slate-100 outline-none"
      >
        <option value="">ทุกคอลัมน์</option>
      </select>

    </div>

    <div class="glass rounded-3xl p-5 shadow-xl">

      <div class="font-bold text-slate-500 text-sm mb-2">
        TOTAL RESULT
      </div>

      <div id="resultCount" class="text-4xl font-black text-indigo-700">
        0
      </div>

    </div>

  </div>

  <!-- TABLE -->
  <div class="glass rounded-3xl shadow-2xl overflow-hidden">

    <div class="overflow-auto max-h-[75vh]">

      <table class="min-w-full text-sm">

        <thead class="bg-slate-100 sticky top-0 z-20">
          <tr id="tableHead"></tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

  /*
    ============================================================
    เปลี่ยนชื่อไฟล์ตรงนี้
    ============================================================
  */

  const CSV_FILE = "TRC_Incentive.csv";

  let rawData = [];
  let filteredData = [];

  let currentSort = {
    column: null,
    direction: "asc"
  };

  const searchInput = document.getElementById("searchInput");
  const columnSelect = document.getElementById("columnSelect");

  const tableHead = document.getElementById("tableHead");
  const tableBody = document.getElementById("tableBody");

  /*
    ============================================================
    LOAD CSV
    ============================================================
  */

  async function loadCSV() {

    const response = await fetch(CSV_FILE);

    const csvText = await response.text();

    Papa.parse(csvText, {
      header: true,
      skipEmptyLines: true,

      complete: function(results){

        rawData = results.data;
        filteredData = [...rawData];

        buildColumnFilter();
        renderTable();
        updateCount();

      }
    });

  }

  /*
    ============================================================
    BUILD FILTER
    ============================================================
  */

  function buildColumnFilter(){

    if(!rawData.length) return;

    const columns = Object.keys(rawData[0]);

    columns.forEach(col => {

      const option = document.createElement("option");

      option.value = col;
      option.textContent = col;

      columnSelect.appendChild(option);

    });

  }

  /*
    ============================================================
    SEARCH
    ============================================================
  */

  function applySearch(){

    const keyword = searchInput.value.toLowerCase().trim();

    const selectedColumn = columnSelect.value;

    filteredData = rawData.filter(row => {

      if(selectedColumn){

        const value = (row[selectedColumn] || "")
          .toString()
          .toLowerCase();

        return value.includes(keyword);

      }else{

        return Object.values(row)
          .join(" ")
          .toLowerCase()
          .includes(keyword);

      }

    });

    renderTable();
    updateCount();

  }

  /*
    ============================================================
    SORT
    ============================================================
  */

  function sortTable(column){

    if(currentSort.column === column){

      currentSort.direction =
        currentSort.direction === "asc"
        ? "desc"
        : "asc";

    }else{

      currentSort.column = column;
      currentSort.direction = "asc";

    }

    filteredData.sort((a,b)=>{

      const valA = (a[column] || "").toString();
      const valB = (b[column] || "").toString();

      const numA = parseFloat(valA);
      const numB = parseFloat(valB);

      let compare;

      if(!isNaN(numA) && !isNaN(numB)){

        compare = numA - numB;

      }else{

        compare = valA.localeCompare(valB,"th");

      }

      return currentSort.direction === "asc"
        ? compare
        : -compare;

    });

    renderTable();

  }

  /*
    ============================================================
    TABLE
    ============================================================
  */

  function renderTable(){

    if(!rawData.length) return;

    const columns = Object.keys(rawData[0]);

    tableHead.innerHTML = "";

    columns.forEach(col=>{

      const th = document.createElement("th");

      th.className =
        "px-5 py-4 text-left font-black text-slate-700 whitespace-nowrap cursor-pointer";

      th.innerHTML = `
        <div class="flex items-center gap-2">
          <span>${col}</span>
          <span class="text-indigo-500">↕</span>
        </div>
      `;

      th.onclick = ()=> sortTable(col);

      tableHead.appendChild(th);

    });

    tableBody.innerHTML = "";

    filteredData.forEach((row,index)=>{

      const tr = document.createElement("tr");

      tr.className =
        "border-b border-slate-100 table-row";

      columns.forEach(col=>{

        const td = document.createElement("td");

        td.className =
          "px-5 py-4 whitespace-nowrap";

        let value = row[col];

        if(value === "" || value == null){

          value = "-";

        }

        /*
          ไฮไลท์เลข
        */

        if(!isNaN(parseFloat(value))){

          td.innerHTML = `
            <span class="font-bold text-emerald-700">
              ${value}
            </span>
          `;

        }else{

          td.textContent = value;

        }

        tr.appendChild(td);

      });

      tableBody.appendChild(tr);

    });

  }

  /*
    ============================================================
    RESULT COUNT
    ============================================================
  */

  function updateCount(){

    document.getElementById("resultCount")
      .textContent = filteredData.length;

  }

  /*
    ============================================================
    EXPORT CSV
    ============================================================
  */

  document.getElementById("exportBtn")
    .addEventListener("click",()=>{

      const csv = Papa.unparse(filteredData);

      const blob = new Blob([csv],{
        type:"text/csv;charset=utf-8;"
      });

      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);

      link.download = "filtered.csv";

      link.click();

    });

  /*
    ============================================================
    CLEAR
    ============================================================
  */

  document.getElementById("clearBtn")
    .addEventListener("click",()=>{

      searchInput.value = "";
      columnSelect.value = "";

      filteredData = [...rawData];

      renderTable();
      updateCount();

    });

  /*
    ============================================================
    EVENTS
    ============================================================
  */

  searchInput.addEventListener("input", applySearch);

  columnSelect.addEventListener("change", applySearch);

  /*
    ============================================================
    START
    ============================================================
  */

  loadCSV();

</script>

</body>
</html>

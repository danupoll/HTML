<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSV Smart Search</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body{
      background:#f8fafc;
    }

    .glass{
      background:rgba(255,255,255,0.85);
      border:1px solid #e2e8f0;
      backdrop-filter:blur(10px);
    }

    .table-row:hover{
      background:#eef2ff;
    }

    ::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    ::-webkit-scrollbar-thumb{
      background:#cbd5e1;
      border-radius:999px;
    }
  </style>
</head>

<body class="text-slate-800 min-h-screen">

<div class="max-w-[1800px] mx-auto px-4 py-6">

  <div class="glass rounded-3xl shadow-xl p-6 mb-6">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

      <div>
        <h1 class="text-4xl font-black text-indigo-700">
          🔎 CSV Smart Search
        </h1>

        <p class="text-slate-500 mt-2">
          Dynamic Filter • Fast Search
        </p>
      </div>

      <div class="flex gap-3 flex-wrap">

        <button
          id="clearBtn"
          class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-3 rounded-2xl font-bold"
        >
          ล้าง Filter
        </button>

        <button
          id="exportBtn"
          class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-2xl font-bold"
        >
          Export Excel
        </button>

      </div>

    </div>

  </div>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-5 mb-6">

    <div class="glass rounded-3xl p-5 shadow-lg">

      <div class="text-sm font-bold text-slate-500 mb-3">
        TOTAL RESULT
      </div>

      <div id="resultCount"
        class="text-4xl font-black text-indigo-700">
        0
      </div>

    </div>

    <div
      id="dynamicFilters"
      class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3"
    ></div>

  </div>

  <div class="glass rounded-3xl overflow-hidden shadow-xl">

    <div class="overflow-auto max-h-[75vh]">

      <table class="min-w-full text-sm">

        <thead class="bg-slate-100 sticky top-0 z-20">
          <tr id="tableHead"></tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

const CSV_FILE = "./TRC_Incentive.csv";

let rawData = [];
let filteredData = [];

const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");
const dynamicFilters = document.getElementById("dynamicFilters");

async function loadCSV(){

  try{

    const response = await fetch(CSV_FILE);

    if(!response.ok){
      throw new Error("โหลด CSV ไม่สำเร็จ");
    }

    const csvText = await response.text();

    if(!csvText.trim()){
      throw new Error("CSV ว่าง");
    }

    Papa.parse(csvText, {
    header:true,
    skipEmptyLines:true,

    complete:function(results){

      rawData = results.data;
      filteredData = [...rawData];

      buildFilters();
      buildTable();
      renderTable();
      updateCount();

      }
    });

  }catch(err){

    console.error(err);

    dynamicFilters.innerHTML = `
      <div class="glass rounded-3xl p-5 text-red-500 font-bold lg:col-span-3">
        โหลดไฟล์ CSV ไม่ได้ ❌<br>
        ตรวจสอบชื่อไฟล์ว่าเป็น TRC_Incentive.csv
      </div>
    `;

  }

}

function buildFilters(){

  dynamicFilters.innerHTML = "";

  if(!rawData.length) return;

  const columns = Object.keys(rawData[0]);

  columns.forEach(col => {

    const div = document.createElement("div");

    div.className = "glass rounded-3xl p-5 shadow-lg";

    div.innerHTML = `
      <div class="text-xs font-bold text-slate-500 mb-2">
        ${col}
      </div>

      <input
        type="text"
        data-column="${col}"
        placeholder="ค้นหา ${col}"
        class="column-filter w-full px-3 py-2 rounded-xl bg-slate-100 outline-none text-sm"
      />
    `;

    dynamicFilters.appendChild(div);

  });

  let timer;

  document.querySelectorAll(".column-filter")
    .forEach(input => {

      input.addEventListener("input", () => {

        clearTimeout(timer);

        timer = setTimeout(() => {
          applyFilters();
        }, 120);

      });

    });

}

function applyFilters(){

  const filters = document.querySelectorAll(".column-filter");

  filteredData = rawData.filter(row => {

    for(const input of filters){

      const column = input.dataset.column;

      const keyword = input.value
        .toLowerCase()
        .trim();

      if(!keyword) continue;

      const value = (row[column] || "")
        .toString()
        .toLowerCase();

      if(!value.includes(keyword)){
        return false;
      }

    }

    return true;

  });

  renderTable();
  updateCount();

}

function buildTable(){

  if(!rawData.length) return;

  const columns = Object.keys(rawData[0]);

  tableHead.innerHTML = "";

  columns.forEach(col => {

    const th = document.createElement("th");

    th.className = "px-5 py-4 text-left font-black text-slate-700 whitespace-nowrap";

    th.textContent = col;

    tableHead.appendChild(th);

  });

}

function renderTable(){

  tableBody.innerHTML = "";

  if(!filteredData.length){

    tableBody.innerHTML = `
      <tr>
        <td colspan="999"
          class="text-center py-10 text-slate-400">
          ไม่พบข้อมูล
        </td>
      </tr>
    `;

    return;

  }

  const columns = Object.keys(filteredData[0]);

  filteredData.slice(0,500).forEach(row => {

    const tr = document.createElement("tr");

    tr.className = "border-b border-slate-100 table-row";

    columns.forEach(col => {

      const td = document.createElement("td");

      td.className = "px-5 py-4 whitespace-nowrap";

      let value = row[col];

      if(value === "" || value == null){
        value = "-";
      }

      td.textContent = value;

      tr.appendChild(td);

    });

    tableBody.appendChild(tr);

  });

}

function updateCount(){

  document.getElementById("resultCount")
    .textContent = filteredData.length;

}

document.getElementById("clearBtn")
  .addEventListener("click", () => {

    document.querySelectorAll(".column-filter")
      .forEach(input => {
        input.value = "";
      });

    filteredData = [...rawData];

    renderTable();
    updateCount();

  });

document.getElementById("exportBtn")
  .addEventListener("click", () => {

    const worksheet = filteredData.map(row => Object.values(row).join('	')).join('
');

    const worksheet =
          XLSX.utils.json_to_sheet(filteredData);

        const workbook =
          XLSX.utils.book_new();

        XLSX.utils.book_append_sheet(
          workbook,
          worksheet,
          "Data"
        );

        XLSX.writeFile(
          workbook,
          "filtered.xlsx"
        );

  });

loadCSV();

</script>

</body>
</html>

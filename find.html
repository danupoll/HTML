<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TRC Incentive Search</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body{
      background:#f8fafc;
    }

    .glass{
      background:white;
      border:1px solid #e2e8f0;
    }

    ::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    ::-webkit-scrollbar-thumb{
      background:#cbd5e1;
      border-radius:999px;
    }

    .row-hover:hover{
      background:#f1f5f9;
    }
  </style>
</head>

<body class="text-slate-800">

<div class="max-w-[1700px] mx-auto px-4 py-6">

  <!-- HEADER -->
  <div class="glass rounded-3xl shadow-sm p-6 mb-5">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

      <div>
        <h1 class="text-3xl font-black text-indigo-700">
          🔎 TRC Incentive Search
        </h1>

        <p class="text-slate-500 mt-2">
          โหลด CSV จาก GitHub • เร็ว • Filter จริงจากข้อมูล
        </p>
      </div>

      <div class="text-right">
        <div class="text-slate-500 text-sm">
          RESULT
        </div>

        <div id="resultCount"
          class="text-4xl font-black text-indigo-700">
          0
        </div>
      </div>

    </div>

  </div>

  <!-- FILTER -->
  <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-5">

    <!-- SEARCH -->
    <div class="glass rounded-3xl p-5 lg:col-span-2">

      <div class="text-sm font-bold text-slate-500 mb-2">
        SEARCH
      </div>

      <input
        id="searchInput"
        type="text"
        placeholder="ค้นหาได้ทุกคอลัมน์..."
        class="w-full px-4 py-4 rounded-2xl bg-slate-100 outline-none focus:ring-2 focus:ring-indigo-300"
      />

    </div>

    <!-- POSITION -->
    <div class="glass rounded-3xl p-5">

      <div class="text-sm font-bold text-slate-500 mb-2">
        POSITION
      </div>

      <select
        id="positionFilter"
        class="w-full px-4 py-4 rounded-2xl bg-slate-100 outline-none"
      >
        <option value="">ALL</option>
      </select>

    </div>

    <!-- INCENTIVE -->
    <div class="glass rounded-3xl p-5">

      <div class="text-sm font-bold text-slate-500 mb-2">
        INCENTIVE
      </div>

      <select
        id="incentiveFilter"
        class="w-full px-4 py-4 rounded-2xl bg-slate-100 outline-none"
      >
        <option value="">ALL</option>
      </select>

    </div>

  </div>

  <!-- TABLE -->
  <div class="glass rounded-3xl overflow-hidden shadow-sm">

    <div class="overflow-auto max-h-[78vh]">

      <table class="min-w-full text-sm">

        <thead
          id="tableHead"
          class="bg-slate-100 sticky top-0 z-10">
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

  /*
    ============================================
    CONFIG
    ============================================
  */

  const CSV_FILE = "TRC_Incentive.csv";

  /*
    ============================================
    STATE
    ============================================
  */

  let rawData = [];
  let filteredData = [];

  /*
    ============================================
    ELEMENTS
    ============================================
  */

  const searchInput = document.getElementById("searchInput");

  const positionFilter =
    document.getElementById("positionFilter");

  const incentiveFilter =
    document.getElementById("incentiveFilter");

  const tableHead =
    document.getElementById("tableHead");

  const tableBody =
    document.getElementById("tableBody");

  /*
    ============================================
    LOAD CSV
    ============================================
  */

  async function loadCSV(){

    const response = await fetch(CSV_FILE);

    const text = await response.text();

    Papa.parse(text, {

      header:true,
      skipEmptyLines:true,

      complete:(results)=>{

        rawData = results.data;
        filteredData = [...rawData];

        buildFilters();
        buildTableHeader();
        renderTable();
        updateCount();

      }

    });

  }

  /*
    ============================================
    BUILD FILTERS
    ============================================
  */

  function buildFilters(){

    const positions =
      [...new Set(
        rawData
          .map(x => x.position_code)
          .filter(Boolean)
      )].sort();

    const incentives =
      [...new Set(
        rawData
          .map(x => x.trc_incentive_name)
          .filter(Boolean)
      )].sort();

    positions.forEach(value=>{

      positionFilter.innerHTML += `
        <option value="${value}">
          ${value}
        </option>
      `;

    });

    incentives.forEach(value=>{

      incentiveFilter.innerHTML += `
        <option value="${value}">
          ${value}
        </option>
      `;

    });

  }

  /*
    ============================================
    TABLE HEADER
    ============================================
  */

  function buildTableHeader(){

    if(!rawData.length) return;

    const columns = Object.keys(rawData[0]);

    let html = "<tr>";

    columns.forEach(col=>{

      html += `
        <th class="
          px-5 py-4
          text-left
          whitespace-nowrap
          font-black
          text-slate-700
        ">
          ${col}
        </th>
      `;

    });

    html += "</tr>";

    tableHead.innerHTML = html;

  }

  /*
    ============================================
    FILTER
    ============================================
  */

  function applyFilters(){

    const keyword =
      searchInput.value
        .toLowerCase()
        .trim();

    const position =
      positionFilter.value;

    const incentive =
      incentiveFilter.value;

    filteredData = rawData.filter(row=>{

      /*
        SEARCH
      */

      const matchSearch =
        !keyword ||
        Object.values(row)
          .join(" ")
          .toLowerCase()
          .includes(keyword);

      /*
        POSITION
      */

      const matchPosition =
        !position ||
        row.position_code === position;

      /*
        INCENTIVE
      */

      const matchIncentive =
        !incentive ||
        row.trc_incentive_name === incentive;

      return (
        matchSearch &&
        matchPosition &&
        matchIncentive
      );

    });

    renderTable();
    updateCount();

  }

  /*
    ============================================
    FAST TABLE RENDER
    ============================================
  */

  function renderTable(){

    if(!filteredData.length){

      tableBody.innerHTML = `
        <tr>
          <td colspan="999"
            class="text-center py-10 text-slate-400">
            ไม่พบข้อมูล
          </td>
        </tr>
      `;

      return;

    }

    const columns =
      Object.keys(filteredData[0]);

    /*
      จำกัด render
      เร็วขึ้นเยอะ
    */

    const LIMIT = 500;

    const rows =
      filteredData.slice(0, LIMIT);

    let html = "";

    for(const row of rows){

      html += `
        <tr class="
          border-b border-slate-100
          row-hover
        ">
      `;

      for(const col of columns){

        let value = row[col];

        if(
          value === "" ||
          value == null
        ){
          value = "-";
        }

        html += `
          <td class="
            px-5 py-4
            whitespace-nowrap
          ">
            ${value}
          </td>
        `;

      }

      html += "</tr>";

    }

    tableBody.innerHTML = html;

  }

  /*
    ============================================
    RESULT COUNT
    ============================================
  */

  function updateCount(){

    document.getElementById("resultCount")
      .textContent =
      filteredData.length.toLocaleString();

  }

  /*
    ============================================
    DEBOUNCE
    ============================================
  */

  function debounce(func, delay){

    let timer;

    return (...args)=>{

      clearTimeout(timer);

      timer = setTimeout(()=>{

        func(...args);

      },delay);

    };

  }

  /*
    ============================================
    EVENTS
    ============================================
  */

  searchInput.addEventListener(
    "input",
    debounce(applyFilters, 200)
  );

  positionFilter.addEventListener(
    "change",
    applyFilters
  );

  incentiveFilter.addEventListener(
    "change",
    applyFilters
  );

  /*
    ============================================
    START
    ============================================
  */

  loadCSV();

</script>

</body>
</html>

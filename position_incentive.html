<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Position Incentive Search</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:40px;
  background:#f5f5f5;
}

h2{
  margin-bottom:20px;
}

input{
  padding:10px;
  width:320px;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:6px;
}

.card{
  background:white;
  border:1px solid #ddd;
  padding:12px;
  margin-top:12px;
  border-radius:6px;
}

strong{
  display:inline-block;
  width:160px;
}
</style>

</head>
<body>

<h2>ค้นหา Position Code</h2>

<input type="text" id="searchBox" placeholder="ใส่ position code">

<div id="result"></div>

<script>

let dataRows = [];

fetch("position_incentive.csv")
.then(res => {
  if(!res.ok){
    throw new Error("โหลด CSV ไม่ได้");
  }
  return res.text();
})
.then(text => {

  const lines = text.trim().split(/\r?\n/);
  const delimiter = lines[0].includes("\t") ? "\t" : ",";

  const rows = lines.map(r =>
    r.split(delimiter).map(c => c.trim())
  );

  dataRows = rows.slice(1);

})
.catch(err => {
  document.getElementById("result").innerHTML =
    "<p style='color:red'>โหลด CSV ไม่ได้ ตรวจ path ไฟล์</p>";
});

document.getElementById("searchBox").addEventListener("input", function(){

  const keyword = this.value.trim();
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  if(keyword === "") return;

  const found = dataRows.filter(r => r[0].includes(keyword));

  if(found.length === 0){
    resultDiv.innerHTML = "<p>ไม่พบข้อมูล</p>";
    return;
  }

  // รวม workgroup
  const grouped = {};

  found.forEach(r => {

    const key = r[0] + "|" + r[4];

    if(!grouped[key]){
      grouped[key] = {
        position:r[0],
        name:r[1],
        rate:r[2],
        code:r[4],
        workgroups:[]
      };
    }

    if(!grouped[key].workgroups.includes(r[3])){
      grouped[key].workgroups.push(r[3]);
    }

  });

  Object.values(grouped).forEach(item => {

    resultDiv.innerHTML += `
      <div class="card">
        <div><strong>Position Code:</strong> ${item.position}</div>
        <div><strong>Incentive Name:</strong> ${item.name}</div>
        <div><strong>Rate:</strong> ${item.rate}</div>
        <div><strong>Workgroups:</strong> ${item.workgroups.join(", ")}</div>
        <div><strong>Incentive Code:</strong> ${item.code}</div>
      </div>
    `;

  });

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Position Incentive Search</title>

<style>

body{
  font-family: Arial, sans-serif;
  padding:40px;
  background:#f4f6f8;
}

h2{
  margin-bottom:10px;
}

.toolbar{
  margin-bottom:20px;
}

input{
  padding:12px;
  width:340px;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:8px;
  outline:none;
}

input:focus{
  border-color:#007bff;
}

button{
  padding:12px 16px;
  margin-left:10px;
  font-size:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#28a745;
  color:white;
}

button:hover{
  background:#218838;
}

#result{
  margin-top:20px;
}

.card{
  background:white;
  border:1px solid #e2e2e2;
  padding:16px;
  margin-bottom:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.row{
  display:flex;
  margin-bottom:6px;
}

.label{
  width:170px;
  font-weight:bold;
}

.value{
  flex:1;
  word-break:break-word;
}

.highlight{
  background:yellow;
  padding:2px 4px;
}

</style>

</head>
<body>

<h2>🔎 ค้นหา Position / Workgroup</h2>

<div class="toolbar">
<input type="text" id="searchBox" placeholder="พิมพ์ position หรือ workgroup">
<button onclick="downloadCSV()">📥 Download CSV (ทั้งหมดในระบบ)</button>
</div>

<div id="result"></div>

<script>

let dataRows = [];

fetch("./position_incentive.csv")
.then(res => res.text())
.then(text => {

  const lines = text.trim().split(/\r?\n/);

  dataRows = lines.slice(1).map(row => {

    const cols = row.split(",").map(c => c.replace(/"/g,"").trim());

    return {
      position: cols[0],
      name: cols[1],
      rate: cols[2],
      workgroup: cols[3],
      code: cols[4]
    };

  });

});

function highlight(text, keyword){

  const regex = new RegExp(keyword, "gi");
  return text.replace(regex, match =>
    `<span class="highlight">${match}</span>`
  );

}

document.getElementById("searchBox").addEventListener("keyup", function(){

  const keyword = this.value.trim().toLowerCase();
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "";

  if(keyword === "") return;

  const found = dataRows.filter(r =>
    r.position.toLowerCase().includes(keyword) ||
    r.workgroup.toLowerCase().includes(keyword)
  );

  if(found.length === 0){
    resultDiv.innerHTML = "<p>ไม่พบข้อมูล</p>";
    return;
  }

  found.forEach(r => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML =
      "<div class='row'><div class='label'>Position Code:</div><div class='value'>"+highlight(r.position,keyword)+"</div></div>" +
      "<div class='row'><div class='label'>Incentive Name:</div><div class='value'>"+r.name+"</div></div>" +
      "<div class='row'><div class='label'>Rate:</div><div class='value'>"+r.rate+"</div></div>" +
      "<div class='row'><div class='label'>Workgroup:</div><div class='value'>"+highlight(r.workgroup.replace(/\n/g,", "),keyword)+"</div></div>" +
      "<div class='row'><div class='label'>Incentive Code:</div><div class='value'>"+r.code+"</div></div>";

    resultDiv.appendChild(card);

  });

});

function downloadCSV(){

  const link = document.createElement("a");
  link.href = "position_incentive.csv";
  link.download = "position_incentive.csv";
  link.click();

}

</script>

</body>
</html>

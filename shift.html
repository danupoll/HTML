<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ตัวแปลงกะเวลา</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050816;
--card:rgba(15,23,42,.85);
--border:rgba(255,255,255,.08);
--text:#fff;
--muted:#94a3b8;
--purple:#7c3aed;
--purple2:#4f46e5;
--shadow:0 25px 60px rgba(0,0,0,.45);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:
radial-gradient(circle at top left,#312e81 0%,transparent 30%),
radial-gradient(circle at bottom right,#581c87 0%,transparent 30%),
var(--bg);
min-height:100vh;
padding:32px;
color:var(--text);
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(14px);
border-radius:32px;
padding:32px;
box-shadow:var(--shadow);
}

.top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
margin-bottom:24px;
flex-wrap:wrap;
}

.title h1{
font-size:48px;
font-weight:800;
letter-spacing:-2px;
margin-bottom:10px;
}

.title p{
color:var(--muted);
line-height:1.7;
font-size:15px;
max-width:620px;
}

.stats{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.stat{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
padding:18px;
border-radius:22px;
min-width:150px;
}

.stat small{
display:block;
color:#c4b5fd;
font-size:12px;
font-weight:700;
margin-bottom:8px;
}

.stat strong{
font-size:34px;
font-weight:800;
}

textarea{
width:100%;
height:250px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:22px;
font-size:16px;
color:white;
outline:none;
resize:none;
line-height:1.8;
transition:.2s;
}

textarea:focus{
border-color:rgba(124,58,237,.7);
box-shadow:0 0 0 5px rgba(124,58,237,.15);
}

.actions{
display:flex;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

button{
border:none;
padding:16px 24px;
border-radius:18px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.gen{
background:linear-gradient(135deg,var(--purple),var(--purple2));
color:white;
box-shadow:0 15px 40px rgba(124,58,237,.35);
}

.gen:hover{
transform:translateY(-2px);
}

.copy{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
color:white;
}

.copy:hover{
background:rgba(255,255,255,.1);
}

.output-wrap{
margin-top:28px;
}

.output-title{
font-size:24px;
font-weight:800;
margin-bottom:10px;
}

.output-sub{
color:var(--muted);
font-size:14px;
margin-bottom:16px;
}

.output{
background:#030712;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
min-height:320px;
white-space:pre-wrap;
overflow:auto;
font-size:16px;
line-height:1.8;
font-family:monospace;
}

.footer{
margin-top:18px;
text-align:center;
font-size:12px;
color:#64748b;
}

@media(max-width:768px){

.title h1{
font-size:38px;
}

.stat{
flex:1;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top">

<div class="title">

<h2>Edit Shift - Pattern 🚀</h2>

<p>
วางกะเวลาแบบไหนก็ได้ เช่น 0800-1700 / 08:00-17:00 / 08.00-17.00
ระบบจะจัดรูปแบบ + ตัดข้อมูลซ้ำให้อัตโนมัติ
</p>

</div>

<div class="stats">

<div class="stat">
<small>กะที่ไม่ซ้ำ</small>
<strong id="count">0</strong>
</div>

<div class="stat">
<small>จำนวนรายการ</small>
<strong id="rows">0</strong>
</div>

</div>

</div>

<textarea id="input" placeholder="08:00-17:00
0800-1700
08.00-17.00
09.00-18.00"></textarea>

<div class="actions">

<button class="gen" onclick="generateShift()">
⚡ ประมวลผล
</button>

<button class="copy" onclick="copyOutput()">
📋 คัดลอก
</button>

</div>

<div class="output-wrap">

<div class="output-title">ผลลัพธ์</div>

<div class="output-sub">
พร้อมใช้งานสำหรับ SQL / Excel / API
</div>

<div class="output" id="output"></div>

</div>

<div class="footer">
Dark Purple UI • Auto Normalize • Remove Duplicate
</div>

</div>

</div>

<script>

function normalizeShift(text){

text = text.toUpperCase().trim();

/* ลบคำที่ไม่จำเป็น */
text = text
.replace(/SHIFT/g,'')
.replace(/SH/g,'')
.replace(/_/g,'')
.replace(/\s+/g,'');

/* แปลง H เป็น : */
text = text.replace(/H/g,':');

/* แปลง . เป็น : */
text = text.replace(/\./g,':');

/* ดึงเวลา */
const match = text.match(/(\d{1,2})[:]?(\d{2})?\-(\d{1,2})[:]?(\d{2})?/);

if(!match) return null;

let sh = match[1].padStart(2,'0');
let sm = (match[2] || '00').padStart(2,'0');

let eh = match[3].padStart(2,'0');
let em = (match[4] || '00').padStart(2,'0');

/* กัน format เวลาเพี้ยน */
if(
parseInt(sh) > 23 ||
parseInt(eh) > 23 ||
parseInt(sm) > 59 ||
parseInt(em) > 59
){
return null;
}

return `${sh}${sm}-${eh}${em}`;

}

function generateShift(){

const lines = document.getElementById('input').value.split('\n');

let uniqueShifts = new Set();

lines.forEach(line=>{

const shift = normalizeShift(line);

if(shift){
uniqueShifts.add(shift);
}

});

let result = [];

uniqueShifts.forEach(shift=>{

result.push(`SH${shift}`);
result.push(`OFF${shift}`);

});

document.getElementById('output').textContent = result.join('\n');

document.getElementById('count').textContent = uniqueShifts.size;

document.getElementById('rows').textContent = uniqueShifts.size * 2;

}

function copyOutput(){

const text = document.getElementById('output').textContent;

if(!text) return;

navigator.clipboard.writeText(text);

const btn = document.querySelector('.copy');

btn.innerHTML = '✅ คัดลอกแล้ว';

setTimeout(()=>{
btn.innerHTML = '📋 คัดลอก';
},1500);

}

</script>

</body>
</html>

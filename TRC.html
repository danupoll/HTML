<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CSV Smart Search</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

  :root{

    --bg:#050816;
    --bg2:#0b1120;

    --card:rgba(15,23,42,0.72);

    --border:rgba(139,92,246,0.18);

    --text:#e2e8f0;
    --muted:#94a3b8;

    --primary:#8b5cf6;
    --primary2:#6366f1;

  }

  body{

    background:
      radial-gradient(circle at top left,
        rgba(139,92,246,0.18),
        transparent 28%
      ),

      radial-gradient(circle at bottom right,
        rgba(99,102,241,0.18),
        transparent 30%
      ),

      linear-gradient(
        135deg,
        #050816 0%,
        #0b1120 45%,
        #020617 100%
      );

    color:var(--text);

    background-attachment:fixed;

  }

  .glass{

    background:var(--card);

    border:1px solid var(--border);

    backdrop-filter:blur(18px);

    box-shadow:
      0 10px 40px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.03);

  }

  .table-row{

    transition:0.18s ease;

  }

  .table-row:hover{

    background:
      linear-gradient(
        90deg,
        rgba(99,102,241,0.10),
        rgba(139,92,246,0.10)
      );

  }

  .column-filter{

    background:#020617 !important;

    border:1px solid rgba(139,92,246,0.15);

    color:white !important;

    transition:0.18s;

  }

  .column-filter::placeholder{

    color:#64748b;

  }

  .column-filter:focus{

    border-color:#8b5cf6;

    box-shadow:
      0 0 0 3px rgba(139,92,246,0.15);

    outline:none;

  }

  th{

    background:#111827;

    color:#c4b5fd;

    border-bottom:1px solid rgba(139,92,246,0.15);

  }

  td{

    color:#e2e8f0;

  }

  .copy-btn{

    background:rgba(139,92,246,0.15);

    border:1px solid rgba(139,92,246,0.18);

    color:#ddd6fe;

    transition:0.18s;

  }

  .copy-btn:hover{

    background:rgba(139,92,246,0.35);

    transform:translateY(-1px);

  }

  .toggle-item{

    background:#020617;

    border:1px solid rgba(139,92,246,0.12);

    transition:0.18s;

  }

  .toggle-item:hover{

    background:rgba(139,92,246,0.10);

  }

  .main-btn{

    transition:0.18s;

  }

  .main-btn:hover{

    transform:translateY(-2px);

    box-shadow:
      0 8px 25px rgba(99,102,241,0.35);

  }

  ::-webkit-scrollbar{
    width:10px;
    height:10px;
  }

  ::-webkit-scrollbar-thumb{

    background:
      linear-gradient(
        to bottom,
        #8b5cf6,
        #6366f1
      );

    border-radius:999px;

  }

  ::-webkit-scrollbar-track{

    background:#020617;

  }

</style>
</head>

<body class="min-h-screen">

<div class="max-w-[1800px] mx-auto px-4 py-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-6 mb-6">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

      <div>

        <h1 class="text-5xl font-black text-violet-300 drop-shadow-[0_0_25px_rgba(139,92,246,0.55)]">
          🔎 CSV Smart Search
        </h1>

        <p class="text-slate-400 mt-2">
          Dark Cyber Dashboard
        </p>

      </div>

      <div class="flex gap-3 flex-wrap">

        <button
          id="clearBtn"
          class="main-btn bg-rose-500 hover:bg-rose-600 px-5 py-3 rounded-2xl font-bold text-white"
        >
          ล้าง Filter
        </button>

        <button
          id="downloadFilteredBtn"
          class="main-btn bg-violet-600 hover:bg-violet-700 px-5 py-3 rounded-2xl font-bold text-white"
        >
          ดาวน์โหลดข้อมูลที่กรอง
        </button>

        <a
          href="TRC_Incentive.csv"
          download
          class="main-btn bg-emerald-600 hover:bg-emerald-700 px-5 py-3 rounded-2xl font-bold text-white inline-flex items-center"
        >
          ดาวน์โหลด CSV
        </a>

      </div>

    </div>

  </div>

  <!-- STATS -->

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-5 mb-6">

    <div class="glass rounded-3xl p-5">

      <div class="text-sm font-bold text-slate-400 mb-3">
        TOTAL RESULT
      </div>

      <div
        id="resultCount"
        class="text-5xl font-black text-violet-300"
      >
        0
      </div>

      <div
        id="showingCount"
        class="text-sm text-slate-500 mt-2"
      >
      </div>

    </div>

    <div
      id="dynamicFilters"
      class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3"
    ></div>

  </div>

  <!-- COLUMN TOGGLE -->

  <div class="glass rounded-3xl p-5 mb-6">

    <div class="font-black text-violet-300 mb-4 text-lg">
      👁️ ซ่อน / แสดง Column
    </div>

    <div
      id="columnToggle"
      class="flex flex-wrap gap-3"
    ></div>

  </div>

  <!-- TABLE -->

  <div class="glass rounded-3xl overflow-hidden">

    <div class="overflow-auto max-h-[75vh]">

      <table class="min-w-full text-sm">

        <thead class="sticky top-0 z-20">
          <tr id="tableHead"></tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

const CSV_FILE = "TRC_Incentive.csv";

let rawData = [];
let filteredData = [];
let hiddenColumns = [];

const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");
const dynamicFilters = document.getElementById("dynamicFilters");

async function loadCSV(){

  try{

    const response = await fetch(CSV_FILE);

    if(!response.ok){
      throw new Error("โหลด CSV ไม่สำเร็จ");
    }

    const csvText = await response.text();

    Papa.parse(csvText, {

      header:true,
      skipEmptyLines:true,

      complete:function(results){

        rawData = results.data;
        filteredData = [...rawData];

        buildFilters();
        buildColumnToggle();
        buildTable();
        renderTable();
        updateCount();

      }

    });

  }catch(err){

    console.error(err);

    alert("โหลด CSV ไม่สำเร็จ");

  }

}

function buildFilters(){

  dynamicFilters.innerHTML = "";

  if(!rawData.length) return;

  const columns = Object.keys(rawData[0]);

  columns.forEach(col => {

    const div = document.createElement("div");

    div.className = "glass rounded-3xl p-5";

    div.innerHTML = `
      <div class="text-xs font-bold text-slate-400 mb-2">
        ${col}
      </div>

      <input
        type="text"
        data-column="${col}"
        placeholder="ค้นหา ${col}"
        class="column-filter w-full px-3 py-2 rounded-xl text-sm"
      />
    `;

    dynamicFilters.appendChild(div);

  });

  let timer;

  document.querySelectorAll(".column-filter")
    .forEach(input => {

      input.addEventListener("input", () => {

        clearTimeout(timer);

        timer = setTimeout(() => {
          applyFilters();
        }, 120);

      });

    });

}

function buildColumnToggle(){

  const wrap = document.getElementById("columnToggle");

  wrap.innerHTML = "";

  const columns = Object.keys(rawData[0]);

  columns.forEach(col => {

    const label = document.createElement("label");

    label.className =
      "toggle-item flex items-center gap-2 px-4 py-2 rounded-xl cursor-pointer text-sm";

    label.innerHTML = `
      <input
        type="checkbox"
        checked
        value="${col}"
        class="column-toggle accent-violet-500"
      />

      <span>${col}</span>
    `;

    wrap.appendChild(label);

  });

  document.querySelectorAll(".column-toggle")
    .forEach(input => {

      input.addEventListener("change", () => {

        hiddenColumns = [];

        document.querySelectorAll(".column-toggle")
          .forEach(cb => {

            if(!cb.checked){
              hiddenColumns.push(cb.value);
            }

          });

        buildTable();
        renderTable();

      });

    });

}

function applyFilters(){

  const filters = document.querySelectorAll(".column-filter");

  filteredData = rawData.filter(row => {

    for(const input of filters){

      const column = input.dataset.column;

      const keyword = input.value
        .toLowerCase()
        .trim();

      if(!keyword) continue;

      const value = (row[column] || "")
        .toString()
        .toLowerCase();

      if(!value.includes(keyword)){
        return false;
      }

    }

    return true;

  });

  renderTable();
  updateCount();

}

function buildTable(){

  tableHead.innerHTML = "";

  const columns = Object.keys(rawData[0]);

  columns.forEach(col => {

    if(hiddenColumns.includes(col)) return;

    const th = document.createElement("th");

    th.className =
      "px-5 py-4 text-left font-black whitespace-nowrap";

    th.innerHTML = `
      <div class="flex items-center gap-2">

        <span>${col}</span>

        <button
          onclick="copyColumn('${col}')"
          class="copy-btn px-2 py-1 rounded-lg text-xs"
        >
          📋
        </button>

      </div>
    `;

    tableHead.appendChild(th);

  });

}

async function copyColumn(column){

  const values = filteredData
    .map(row => row[column])
    .filter(v => v != null && v !== "");

  const text = values.join("\n");

  try{

    await navigator.clipboard.writeText(text);

    alert(`Copy ${values.length} rows แล้ว`);

  }catch(err){

    console.error(err);

    alert("Copy ไม่สำเร็จ");

  }

}

function renderTable(){

  tableBody.innerHTML = "";

  if(!filteredData.length){

    tableBody.innerHTML = `
      <tr>
        <td
          colspan="999"
          class="text-center py-16 text-slate-500"
        >
          ไม่พบข้อมูล
        </td>
      </tr>
    `;

    return;

  }

  const columns = Object.keys(filteredData[0]);

  filteredData.slice(0,500).forEach(row => {

    const tr = document.createElement("tr");

    tr.className =
      "border-b border-slate-800 table-row";

    columns.forEach(col => {

      if(hiddenColumns.includes(col)) return;

      const td = document.createElement("td");

      td.className =
        "px-5 py-4 whitespace-nowrap";

      let value = row[col];

      if(value === "" || value == null){
        value = "-";
      }

      td.textContent = value;

      tr.appendChild(td);

    });

    tableBody.appendChild(tr);

  });

}

function updateCount(){

  document.getElementById("resultCount")
    .textContent = filteredData.length;

  document.getElementById("showingCount")
    .textContent =
      `Showing ${Math.min(filteredData.length,500)} / ${filteredData.length} rows`;

}

document.getElementById("clearBtn")
  .addEventListener("click", () => {

    document.querySelectorAll(".column-filter")
      .forEach(input => {
        input.value = "";
      });

    filteredData = [...rawData];

    renderTable();
    updateCount();

  });

document.getElementById("downloadFilteredBtn")
  .addEventListener("click", () => {

    const csv = Papa.unparse(filteredData);

    const blob = new Blob([csv], {
      type:"text/csv;charset=utf-8;"
    });

    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");

    link.href = url;
    link.download = "filtered_data.csv";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

  });

loadCSV();

</script>

</body>
</html>

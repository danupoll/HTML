<!DOCTYPE html>
<html lang="th">
<head>

<title>TRC Incentive</title>

<style>

    font-family:Arial, sans-serif;
}

.card{
    background:#ffffff;
    padding:45px;
    border-radius:16px;

    max-width:500px;
    width:90%;

h1{

    color:#1e293b;

.desc{

    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:0.2s;
}

.download-btn:hover{
